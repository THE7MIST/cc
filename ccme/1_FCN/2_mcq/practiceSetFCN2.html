<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FCN Mock Test</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#111827;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .subtitle{
        text-align:center;
        margin-bottom:25px;
        color:#cbd5e1;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        flex-wrap:wrap;
        gap:10px;
    }

    .progress{
        font-size:18px;
        font-weight:bold;
        color:#facc15;
    }

    .question-box{
        margin-bottom:25px;
    }

    .question{
        font-size:22px;
        margin-bottom:20px;
        line-height:1.5;
    }

    .options{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .option{
        background:#1e293b;
        border:2px solid transparent;
        padding:15px;
        border-radius:12px;
        cursor:pointer;
        transition:0.3s;
        font-size:18px;
    }

    .option:hover{
        background:#334155;
        transform:scale(1.01);
    }

    .option.selected{
        border:2px solid #38bdf8;
        background:#0f766e;
    }

    .buttons{
        display:flex;
        justify-content:space-between;
        margin-top:30px;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        padding:14px 22px;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }

    .prev-btn{
        background:#475569;
        color:white;
    }

    .next-btn{
        background:#2563eb;
        color:white;
    }

    .submit-btn{
        background:#16a34a;
        color:white;
    }

    button:hover{
        opacity:0.9;
        transform:translateY(-2px);
    }

    .result-box{
        display:none;
    }

    .result-box h2{
        text-align:center;
        margin-bottom:20px;
        color:#38bdf8;
    }

    .result-stats{
        text-align:center;
        margin-bottom:25px;
        line-height:2;
        font-size:20px;
    }

    .review{
        margin-top:20px;
    }

    .review-item{
        background:#1e293b;
        padding:18px;
        margin-bottom:15px;
        border-radius:12px;
    }

    .correct{
        color:#4ade80;
        margin-top:10px;
    }

    .wrong{
        color:#f87171;
        margin-top:10px;
    }

    .answer{
        color:#facc15;
        margin-top:8px;
    }

    @media(max-width:600px){

        .question{
            font-size:18px;
        }

        .option{
            font-size:16px;
        }

        button{
            width:100%;
        }

        .buttons{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div id="quiz-container">

        <h1>FCN Mock Test</h1>
        <p class="subtitle"></p>

        <div class="top-bar">
            <div class="progress" id="progress">Question 1 / 40</div>
        </div>

        <div class="question-box">
            <div class="question" id="question"></div>

            <div class="options" id="options"></div>
        </div>

        <div class="buttons">
            <button class="prev-btn" id="prevBtn">Previous</button>
            <button class="next-btn" id="nextBtn">Next</button>
            <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        </div>

    </div>

    <div class="result-box" id="resultBox">
        <h2>Quiz Result</h2>

        <div class="result-stats" id="resultStats"></div>

        <div class="review" id="review"></div>
    </div>

</div>

<script>

const quizData = [

{
question:"UDP and IP protocols provides",
options:[
"Connection less and connection less service",
"Connection oriented and connection oriented service",
"Connection oriented and connection less service",
"Connection less and connection oriented service"
],
answer:"Connection less and connection less service"
},

{
question:"Which of the following statements is a true description of fiber Optic Cable.",
options:[
"Fiber optic cables transfer data in a mesh",
"Fiber optic cables transfer data in light form",
"Fiber optic cables are similar to coaxial cables",
"Fiber optic cable are similar to twisted pair cables"
],
answer:"Fiber optic cables transfer data in light form"
},

{
question:"Fig 1 denotes a _____ and fig 2 denotes a _____",
options:[
"LAN, WAN",
"WAN, LAN",
"LAN, LAN",
"WAN, WAN"
],
answer:"LAN, WAN"
},

{
question:"Match the following Devices with the layers it belongs or functionalities?",
options:[
"a- i, b-iii, c-iv, d-ii",
"a- iii, b-i, c-iv, d-ii",
"a- i, b-iii, c-ii, d-iv",
"a- iii, b-i, c-ii, d-iv"
],
answer:"a- iii, b-i, c-iv, d-ii"
},

{
question:"Which of the following is FALSE for VLANs?",
options:[
"Segmented by port or MAC address",
"No routing is needed for connectivity",
"Span multiple switches",
"VLANS operates at layer 2"
],
answer:"No routing is needed for connectivity"
},

{
question:"What does it mean if a protocol is stateless?",
options:[
"If a stateless protocol is used, it cannot be traced.",
"Server responds to a request, and then forgets about it",
"Client responds to server request and keeps track of the conversation.",
"If a protocol is stateless, it means it is unreliable"
],
answer:"Server responds to a request, and then forgets about it"
},

{
question:"There is a host with IP address like 202.141.152.2. This belongs to which class of IP, what is the network address to which this belongs and assuming there are no sub networks associated with this what will be the broadcast address for the network it is attached with?",
options:[
"Class C, 202.141.0.0, 202.141.152.255",
"Class B, 202.141.0.0, 255.255.0.0",
"Class B, 127.0.0.0, 255.0.0.0",
"Class C, 202.141.152.0, 202.141.152.255"
],
answer:"Class C, 202.141.152.0, 202.141.152.255"
},

{
question:"For which of the following is UDP unsuitable? Choose the most appropriate answer.",
options:[
"DNS",
"SNMP",
"RTP",
"SMTP"
],
answer:"SMTP"
},

{
question:"A subnet mask is used to",
options:[
"Identify different subnets within an intranet",
"Identify different subnets within an internet",
"Identify the number of bits to be used as the network portion in the IP address",
"Mask the IP address of a machine from hackers"
],
answer:"Identify the number of bits to be used as the network portion in the IP address"
},

{
question:"When IP address of a host is known, to map IP address of the host with MAC address which protocol is used?",
options:[
"DHCP",
"RARP",
"ICMP",
"ARP"
],
answer:"ARP"
},

{
question:"Error detection at the data link level is achieved by?",
options:[
"Bit stuffing",
"Cyclic redundancy codes",
"Hamming codes",
"Equalization"
],
answer:"Cyclic redundancy codes"
},

{
question:"A hub connects 24 computers. In that A and B are two machines. A sends data to B. How many computers will receive that data?",
options:[
"Only B will receive",
"All 24 computers will receive",
"Only A and B will receive",
"All computers except A will receive"
],
answer:"All computers except A will receive"
},

{
question:"Which protocol immediately encapsulates an ICMP message?",
options:[
"IP",
"TCP",
"UDP",
"Link Layer Protocol"
],
answer:"IP"
},

{
question:"Which of the following network devices can also act as a packet filter?",
options:[
"Switch",
"HUB",
"BRIDGE",
"Router"
],
answer:"Router"
},

{
question:"Identify the FALSE statement",
options:[
"Wireless LAN and Ethernet are broadcast medium",
"WLAN provides less bandwidth compared to Gigabit Ethernet",
"Wireless LAN and Ethernet can not co-exist",
"WLAN and Ethernet can use IP as their network layer protocol"
],
answer:"Wireless LAN and Ethernet can not co-exist"
},

{
question:"End-to-end connectivity is provided from host-to-host in:",
options:[
"the network layer",
"the transport layer",
"the session layer",
"it is a combined functionality of the network and the data link layers"
],
answer:"the transport layer"
},

{
question:"Which of the following uniquely identifiers a TCP connection?",
options:[
"Sender IP, Receiver IP",
"Sender port, Receiver port",
"Sender MAC and Sender IP, Receiver MAC and Receiver IP",
"Sender IP and Sender Port, Receiver IP and Receiver Port"
],
answer:"Sender IP and Sender Port, Receiver IP and Receiver Port"
},

{
question:"Which of the following layers are not part of TCP/IP when compared OSI model",
options:[
"Session, Application",
"Session, Presentation",
"Application, Presentation",
"Session, Transport"
],
answer:"Session, Presentation"
},

{
question:"Which of the following is NOT the issue to be addressed at Physical layer transmission media?",
options:[
"How many volts should be used to represent 1 and 0 bits.",
"Should the transmission be simultaneously in both directions?",
"What should be the duration of the bit",
"What sliding window protocol to be used"
],
answer:"What sliding window protocol to be used"
},

{
question:"Correctly match the Layer Name with the Name of the unit exchanged at that Layer.",
options:[
"A - iii, B - iv, C - i, D - ii",
"A- iii, B- i, C-ii, D-iv",
"A- iii, B- iv, C- ii, D- i",
"A-iv, B-iii, C-ii, D-I"
],
answer:"A - iii, B - iv, C - i, D - ii"
},

{
question:"Which of the following statement is TRUE regarding wireless networks?",
options:[
"FHSS,DSSS,OFDM,HDSSS are part of Physical layer",
"FHSS,DSSS,OFDM,HDSSS are part of MAC sub layer",
"FHSS,DSSS,OFDM,HDSSS are part of LLC sub layer",
"FHSS,DSSS,OFDM,HDSSS are part of Upper layers"
],
answer:"FHSS,DSSS,OFDM,HDSSS are part of Physical layer"
},

{
question:"Which TCP/IP layer attaches a header and trailer to the transmitting data?",
options:[
"Application Layer",
"Transport Layer",
"Network Layer",
"Data Link Layer"
],
answer:"Data Link Layer"
},

{
question:"A router has the following CIDR entries in the routing table. If a packet comes with destination address 202.112.12.45 arrives at the router, on which interface it will be routed?",
options:[
"interface1",
"interface2",
"interface3",
"Packet will be dropped"
],
answer:"interface3"
},

{
question:"Which of the following is the valid sequence in the three-way handshake for tcp connection establishment",
options:[
"SYN(SEQ=x), SYN(SEQ=y, ACK=x+1), (SEQ=x+1, ACK=y+1)",
"SYN(SEQ=x), SYN(SEQ=x, ACK=x+1), (SEQ=x+1, ACK=x)",
"SYN(SEQ=y), SYN(SEQ=x, ACK=y), (SEQ=y+1, ACK=x+1)",
"SYN(SEQ=x), SYN(SEQ=y, ACK=x), (SEQ=x, ACK=y)"
],
answer:"SYN(SEQ=x), SYN(SEQ=y, ACK=x+1), (SEQ=x+1, ACK=y+1)"
},

{
question:"Which of the following IP Header fields changes from HOP to HOP during routing?",
options:[
"iii only",
"iv only",
"i, ii and iii only",
"All the above fields"
],
answer:"iii only"
},

{
question:"You have a class C network address divided into 3 subnets, you will add 2 subnets in the next 2 years each subnet will have 25 hosts. What subnet mask should you use to create those subnets without wasting the IP addresses?",
options:[
"255.255.255.192",
"255.255.255.248",
"255.255.255.224",
"none of the above"
],
answer:"255.255.255.224"
},

{
question:"IPV4 address is __ bits, IPV6 is ________ bits",
options:[
"32 and 64",
"48 and 128",
"32 and 128",
"48 and 64"
],
answer:"32 and 128"
},

{
question:"Match the following",
options:[
"UTP-RJ11,Serial I/F – RJ45, Telephone – V.35",
"UTP-V.35,Serial I/F – RJ45 Telephone – RJ11",
"UTP-RJ45,Serial I/F – V.35, Telephone – RJ11",
"UTP-RJ45,Serial I/F – RJ11, Telephone – V.35"
],
answer:"UTP-RJ45,Serial I/F – V.35, Telephone – RJ11"
},

{
question:"TCP and IP protocols provides",
options:[
"Connection less and connection less service",
"Connection oriented and connection oriented service",
"Connection oriented and connection less service",
"Connection less and connection oriented service"
],
answer:"Connection oriented and connection less service"
},

{
question:"As data moves from the lower to upper layers in a TCP/IP network, headers are getting ________ but when data moves between the devices in the same layers headers are getting ________",
options:[
"Deleted, Added",
"Deleted, Modified",
"Added, Modified",
"Modified, Added"
],
answer:"Deleted, Modified"
},

{
question:"Match the following",
options:[
"a-i, b-v, c-iii, d-ii, e-iv",
"a-iii, b-i, c-v, d-iv, e-ii",
"a-v, b-i, c-iii, d-ii, e-iv",
"a-iii, b-i, c-v, d-ii, e-iv"
],
answer:"a-iii, b-i, c-v, d-ii, e-iv"
}


];

let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");

function loadQuestion(){

    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML = `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", () => {

            userAnswers[currentQuestion] = option;

            loadQuestion();
        });

        optionsEl.appendChild(div);
    });
}

nextBtn.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){
        currentQuestion++;
        loadQuestion();
    }

});

prevBtn.addEventListener("click", ()=>{

    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }

});

submitBtn.addEventListener("click", showResults);

function showResults(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    document.getElementById("quiz-container").style.display = "none";

    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "block";

    const percentage = ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats").innerHTML = `
        <p>Total Questions: ${quizData.length}</p>
        <p>Correct Answers: ${score}</p>
        <p>Wrong Answers: ${quizData.length - score}</p>
        <p>Percentage: ${percentage}%</p>
    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const isCorrect = userAnswers[index] === q.answer;

        div.innerHTML = `
            <h3>Q${index + 1}. ${q.question}</h3>

            <p class="${isCorrect ? 'correct' : 'wrong'}">
                Your Answer: ${userAnswers[index] || "Not Attempted"}
            </p>

            <p class="answer">
                Correct Answer: ${q.answer}
            </p>
        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
