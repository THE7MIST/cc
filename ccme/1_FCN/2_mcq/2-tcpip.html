<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>COSA Mock Test - Set 2</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#111827;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .subtitle{
        text-align:center;
        margin-bottom:25px;
        color:#cbd5e1;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        flex-wrap:wrap;
        gap:10px;
    }

    .progress{
        font-size:18px;
        font-weight:bold;
        color:#facc15;
    }

    .question-box{
        margin-bottom:25px;
    }

    .question{
        font-size:22px;
        margin-bottom:20px;
        line-height:1.5;
    }

    .options{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .option{
        background:#1e293b;
        border:2px solid transparent;
        padding:15px;
        border-radius:12px;
        cursor:pointer;
        transition:0.3s;
        font-size:18px;
    }

    .option:hover{
        background:#334155;
        transform:scale(1.01);
    }

    .option.selected{
        border:2px solid #38bdf8;
        background:#0f766e;
    }

    .buttons{
        display:flex;
        justify-content:space-between;
        margin-top:30px;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        padding:14px 22px;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }

    .prev-btn{
        background:#475569;
        color:white;
    }

    .next-btn{
        background:#2563eb;
        color:white;
    }

    .submit-btn{
        background:#16a34a;
        color:white;
    }

    button:hover{
        opacity:0.9;
        transform:translateY(-2px);
    }

    .result-box{
        display:none;
    }

    .result-box h2{
        text-align:center;
        margin-bottom:20px;
        color:#38bdf8;
    }

    .result-stats{
        text-align:center;
        margin-bottom:25px;
        line-height:2;
        font-size:20px;
    }

    .review{
        margin-top:20px;
    }

    .review-item{
        background:#1e293b;
        padding:18px;
        margin-bottom:15px;
        border-radius:12px;
    }

    .correct{
        color:#4ade80;
        margin-top:10px;
    }

    .wrong{
        color:#f87171;
        margin-top:10px;
    }

    .answer{
        color:#facc15;
        margin-top:8px;
    }

    @media(max-width:600px){

        .question{
            font-size:18px;
        }

        .option{
            font-size:16px;
        }

        button{
            width:100%;
        }

        .buttons{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div id="quiz-container">

        <h1>COSA Mock Test - Set 2</h1>
        <p class="subtitle">Windows + Linux Interactive MCQ Quiz</p>

        <div class="top-bar">
            <div class="progress" id="progress">Question 1 / 40</div>
        </div>

        <div class="question-box">
            <div class="question" id="question"></div>

            <div class="options" id="options"></div>
        </div>

        <div class="buttons">
            <button class="prev-btn" id="prevBtn">Previous</button>
            <button class="next-btn" id="nextBtn">Next</button>
            <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        </div>

    </div>

    <div class="result-box" id="resultBox">
        <h2>Quiz Result</h2>

        <div class="result-stats" id="resultStats"></div>

        <div class="review" id="review"></div>
    </div>

</div>

<script>

const quizData = [



{
question:"Which TCP/IP layer is responsible for routing packets between networks?",
options:[
"Application",
"Internet",
"Network Access",
"Transport"
],
answer:"Internet"
},

{
question:"Which protocol belongs to the Internet layer?",
options:[
"TCP",
"FTP",
"IP",
"HTTP"
],
answer:"IP"
},

{
question:"What is the PDU at TCP/IP Internet layer?",
options:[
"Frame",
"Segment",
"Packet",
"Bit"
],
answer:"Packet"
},

{
question:"Which protocol is connectionless?",
options:[
"TCP",
"FTP",
"UDP",
"HTTPS"
],
answer:"UDP"
},

{
question:"Which protocol is mainly responsible for reliable delivery?",
options:[
"UDP",
"IP",
"TCP",
"ARP"
],
answer:"TCP"
},

{
question:"Which device mainly works at the Internet layer?",
options:[
"Hub",
"Router",
"Repeater",
"NIC"
],
answer:"Router"
},

{
question:"Which protocol converts domain names into IP addresses?",
options:[
"DHCP",
"DNS",
"ARP",
"ICMP"
],
answer:"DNS"
},

{
question:"Which TCP/IP layer corresponds mainly to OSI Transport layer?",
options:[
"Internet",
"Transport",
"Application",
"Network Access"
],
answer:"Transport"
},

{
question:"Which protocol uses port number 80?",
options:[
"HTTPS",
"SSH",
"HTTP",
"FTP"
],
answer:"HTTP"
},

{
question:"What is encapsulation?",
options:[
"Removing headers",
"Adding headers at each layer",
"Encrypting packets",
"Fragmenting frames"
],
answer:"Adding headers at each layer"
},

{
question:"Which protocol maps IP address to MAC address?",
options:[
"ICMP",
"DNS",
"ARP",
"TCP"
],
answer:"ARP"
},

{
question:"Which protocol is used by ping command?",
options:[
"TCP",
"ICMP",
"ARP",
"UDP"
],
answer:"ICMP"
},

{
question:"Which TCP/IP layer interacts directly with physical media?",
options:[
"Internet",
"Application",
"Transport",
"Network Access"
],
answer:"Network Access"
},

{
question:"Which protocol is best suited for video streaming?",
options:[
"TCP",
"SMTP",
"UDP",
"FTP"
],
answer:"UDP"
},

{
question:"Which protocol establishes connection using three-way handshake?",
options:[
"UDP",
"IP",
"TCP",
"ARP"
],
answer:"TCP"
},

{
question:"Which address changes at every router hop?",
options:[
"IP Address",
"MAC Address",
"Port Number",
"Hostname"
],
answer:"MAC Address"
},

{
question:"Which protocol is used to automatically assign IP addresses?",
options:[
"DNS",
"DHCP",
"FTP",
"ICMP"
],
answer:"DHCP"
},

{
question:"Which TCP/IP layer handles process-to-process communication?",
options:[
"Internet",
"Network Access",
"Application",
"Transport"
],
answer:"Transport"
},

{
question:"Which protocol secures web communication?",
options:[
"HTTP",
"FTP",
"HTTPS",
"TFTP"
],
answer:"HTTPS"
},

{
question:"Which PDU is associated with Network Access layer?",
options:[
"Packet",

"Datagram"
],
answer:"Frame"
},

{
question:"Which protocol is used for sending emails?",
options:[
"SMTP",
"POP3",
"IMAP",
"SNMP"
],
answer:"SMTP"
},

{
question:"Which protocol is used for retrieving emails?",
options:[
"SMTP",
"FTP",
"POP3",
"SSH"
],
answer:"POP3"
},

{
question:"Which protocol is unreliable but faster?",
options:[
"TCP",
"UDP",
"HTTPS",
"ICMP"
],
answer:"UDP"
},

{
question:"Which field in TCP ensures proper ordering?",
options:[
"MAC Address",
"Sequence Number",
"TTL",

],
answer:"Sequence Number"
},

{
question:"Which protocol is responsible for logical addressing?",
options:[
"Ethernet",
"ARP",
"IP",

],
answer:"IP"
},

{
question:"Which protocol mainly works with MAC addressing?",
options:[
"Ethernet",
"TCP",
"FTP",

],
answer:"Ethernet"
},

{
question:"Which device forwards frames using MAC table?",
options:[
"Router",
"Hub",
"Switch",
"Gateway"
],
answer:"Switch"
},

{
question:"What is decapsulation?",
options:[
"Adding trailer",

],

},

{
question:"Which protocol uses port 443?",
options:[

],

},

{
question:"Which TCP/IP layer combines OSI Session and Presentation layers?",
options:[

],
answer:"Application"
},

{
question:"Which protocol checks connectivity and reports errors?",
options:[

],
answer:"ICMP"
},

{
question:"Which protocol is used for remote login securely?",
options:[

],
answer:"SSH"
},

{
question:"Which protocol carries webpages?",
options:[

],
answer:"HTTP"
},

{
question:"Which address remains mostly unchanged end-to-end?",
options:[

],
answer:"IP Address"
},

{
question:"Which protocol works closest to hardware transmission?",
options:[
"Ethernet",
"HTTP",
"FTP",
"DNS"
],
answer:"Ethernet"
},

{
question:"Which protocol provides error recovery and retransmission?",
options:[
"UDP",
"IP",
"TCP",
"ARP"
],
answer:"TCP"
},

{
question:"Which layer converts packets into frames?",
options:[
"Internet",
"Transport",
"Network Access",
"Application"
],
answer:"Network Access"
},

{
question:"Which protocol is commonly used for file transfer?",
options:[
"FTP",
"ICMP",
"ARP",
"DHCP"
],
answer:"FTP"
},

{
question:"Which protocol contains source and destination port numbers?",
options:[
"IP",
"Ethernet",
"TCP/UDP",
"ARP"
],
answer:"TCP/UDP"
},

{
question:"Which protocol is mainly responsible for packet delivery between networks?",
options:[
"TCP",
"Ethernet",
"IP",
"HTTP"
],
answer:"IP"
}



];

let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");

function loadQuestion(){

    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML = `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", () => {

            userAnswers[currentQuestion] = option;

            loadQuestion();
        });

        optionsEl.appendChild(div);
    });
}

nextBtn.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){
        currentQuestion++;
        loadQuestion();
    }

});

prevBtn.addEventListener("click", ()=>{

    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }

});

submitBtn.addEventListener("click", showResults);

function showResults(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    document.getElementById("quiz-container").style.display = "none";

    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "block";

    const percentage = ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats").innerHTML = `
        <p>Total Questions: ${quizData.length}</p>
        <p>Correct Answers: ${score}</p>
        <p>Wrong Answers: ${quizData.length - score}</p>
        <p>Percentage: ${percentage}%</p>
    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const isCorrect = userAnswers[index] === q.answer;

        div.innerHTML = `
            <h3>Q${index + 1}. ${q.question}</h3>

            <p class="${isCorrect ? 'correct' : 'wrong'}">
                Your Answer: ${userAnswers[index] || "Not Attempted"}
            </p>

            <p class="answer">
                Correct Answer: ${q.answer}
            </p>
        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
