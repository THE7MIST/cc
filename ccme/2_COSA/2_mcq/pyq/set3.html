<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FCN Mock Test</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#111827;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .subtitle{
        text-align:center;
        margin-bottom:25px;
        color:#cbd5e1;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        flex-wrap:wrap;
        gap:10px;
    }

    .progress{
        font-size:18px;
        font-weight:bold;
        color:#facc15;
    }

    .question-box{
        margin-bottom:25px;
    }

    .question{
        font-size:22px;
        margin-bottom:20px;
        line-height:1.5;
    }

    .options{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .option{
        background:#1e293b;
        border:2px solid transparent;
        padding:15px;
        border-radius:12px;
        cursor:pointer;
        transition:0.3s;
        font-size:18px;
    }

    .option:hover{
        background:#334155;
        transform:scale(1.01);
    }

    .option.selected{
        border:2px solid #38bdf8;
        background:#0f766e;
    }

    .buttons{
        display:flex;
        justify-content:space-between;
        margin-top:30px;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        padding:14px 22px;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }

    .prev-btn{
        background:#475569;
        color:white;
    }

    .next-btn{
        background:#2563eb;
        color:white;
    }

    .submit-btn{
        background:#16a34a;
        color:white;
    }

    button:hover{
        opacity:0.9;
        transform:translateY(-2px);
    }

    .result-box{
        display:none;
    }

    .result-box h2{
        text-align:center;
        margin-bottom:20px;
        color:#38bdf8;
    }

    .result-stats{
        text-align:center;
        margin-bottom:25px;
        line-height:2;
        font-size:20px;
    }

    .review{
        margin-top:20px;
    }

    .review-item{
        background:#1e293b;
        padding:18px;
        margin-bottom:15px;
        border-radius:12px;
    }

    .correct{
        color:#4ade80;
        margin-top:10px;
    }

    .wrong{
        color:#f87171;
        margin-top:10px;
    }

    .answer{
        color:#facc15;
        margin-top:8px;
    }

    @media(max-width:600px){

        .question{
            font-size:18px;
        }

        .option{
            font-size:16px;
        }

        button{
            width:100%;
        }

        .buttons{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div id="quiz-container">

        <h1>FCN Mock Test</h1>
        <p class="subtitle"></p>

        <div class="top-bar">
            <div class="progress" id="progress">Question 1 / 40</div>
        </div>

        <div class="question-box">
            <div class="question" id="question"></div>

            <div class="options" id="options"></div>
        </div>

        <div class="buttons">
            <button class="prev-btn" id="prevBtn">Previous</button>
            <button class="next-btn" id="nextBtn">Next</button>
            <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        </div>

    </div>

    <div class="result-box" id="resultBox">
        <h2>Quiz Result</h2>

        <div class="result-stats" id="resultStats"></div>

        <div class="review" id="review"></div>
    </div>

</div>

<script>

const quizData = [

{
question:"What is interprocess communication?",
options:[
"communication within the process",
"communication between two process",
"communication between two threads of same process",
"none of the above"
],
answer:"communication between two process"
},

{
question:"The _____ table contains the base address of each page in physical memory.",
options:[
"process",
"memory",
"page",
"frame"
],
answer:"page"
},

{
question:"With paging there is no ______ fragmentation.",
options:[
"internal",
"external",
"both a) and b)",
"none of the above"
],
answer:"external"
},

{
question:"Thrashing ______ the CPU utilization.",
options:[
"increases",
"keeps constant",
"decreases",
"none of the above"
],
answer:"decreases"
},

{
question:"In the blocked state",
options:[
"the processes waiting for I/O are found",
"the processes which is running is found",
"the processes waiting for the processor are found",
"none of the above"
],
answer:"the processes waiting for I/O are found"
},

{
question:"PCB is",
options:[
"Program Control Block",
"Process Control Block",
"Program Communication Block",
"Process Communication Block"
],
answer:"Process Control Block"
},

{
question:"File type can be represented by",
options:[
"file name",
"file extension",
"file identifier",
"none of the above"
],
answer:"file extension"
},

{
question:"What script is run for setting bash global defaults for all users?",
options:[
"/etc/.profile",
"/etc/.bashrc",
"/etc/.log",
"/etc/profile"
],
answer:"/etc/profile"
},

{
question:"Who founded the Linux Kernel?",
options:[
"Bill Gates",
"Ben Thomas",
"Richard Stallman",
"Linus Torvalds"
],
answer:"Linus Torvalds"
},

{
question:"Which of the following is not a part of default Red Hat Linux email system?",
options:[
"Pine",
"The MTA",
"The MUA",
"procmail"
],
answer:"Pine"
},

{
question:"In what file can you specify which users are not allowed to access a system via FTP?",
options:[
"/etc/ftpusers",
"/etc/hosts.deny",
"/etc/ftpaccess",
"All of the above"
],
answer:"/etc/ftpusers"
},

{
question:"Which program is used to schedule particular jobs or programs at particular times on the system?",
options:[
"vi",
"Outlook",
"Scheduler",
"cron"
],
answer:"cron"
},

{
question:"Which command can force all buffers to disk?",
options:[
"save",
"sync",
"edbuff",
"flush"
],
answer:"sync"
},

{
question:"How many extended partitions can exist on one drive?",
options:[
"16",
"4",
"2",
"1",
"None of the above"
],
answer:"1"
},

{
question:"What file contains the list of port numbers (and associated names) monitored by inetd?",
options:[
"/etc/services",
"/etc/nsorder",
"/etc/nsswitch.conf/",
"/etc/hosts",
"None of the above"
],
answer:"/etc/services"
},

{
question:"The location for subdirectories for local programs and executables for user and administrative commands, is:",
options:[
"/usr",
"/tmp",
"/opt",
"/mnt"
],
answer:"/usr"
},

{
question:"Which of the following is not a filter command?",
options:[
"sort",
"wc",
"grep",
"cat"
],
answer:"cat"
},

{
question:"What command is used to assign executable permission to all of the files named report?",
options:[
"chmod ugo + x report",
"chmod u + x report",
"chmod ugo + rw report",
"chmod ugo + r report"
],
answer:"chmod ugo + x report"
},

{
question:"LILO",
options:[
"stands for Linux loader",
"is the Linux boot loader",
"is a tool used to boot the Kernel on x86 hardware",
"All of the above"
],
answer:"All of the above"
},

{
question:"What command is used to set user and group quotas?",
options:[
"/sbin/usrquota",
"/sbin/edquota",
"/sbin/quotaon",
"/sbin/quota"
],
answer:"/sbin/edquota"
},

{
question:"Which of the following subdirectory(ies) contains the system boot scripts.",
options:[
"/dev",
"/bin",
"/etc",
"/home"
],
answer:"/etc"
},

{
question:"What of the following tool is used to check and repair Linux file systems?",
options:[
"mkfs",
"fdisk",
"fsck",
"mount"
],
answer:"fsck"
},

{
question:"Where can system and mail logs be found in Red Hat Linux?",
options:[
"/var/log",
"/etc/log",
"/mail",
"All of the above"
],
answer:"/var/log"
},

{
question:"What TCP/IP protocol is used for transferring electronic mail messages from one machine to another?",
options:[
"FTP",
"SNMP",
"SMTP",
"RPC"
],
answer:"SMTP"
},

{
question:"Which is the authentication protocol used by Windows Server 2008?",
options:[
"Kerberos",
"LDAP",
"TCP/IP",
"HTTP"
],
answer:"Kerberos"
},

{
question:"What tool is used to enable Remote Desktop on a Server?",
options:[
"Terminal Services Manager",
"Terminal Services Configuration",
"System properties in Control Panel",
"Terminal Services Licensing"
],
answer:"System properties in Control Panel"
},

{
question:"What are the minimum NTFS permissions required to allow users to open document and to run the programs stored in a shared folder?",
options:[
"Full Control",
"Modify",
"Write",

],
answer:"Read and Execute"
},

{
question:"Which of the following must be done to generate a log resource access for a file or folder?",
options:[
"Configure NTFS permissions to allow the system account to audit resource access.",
"Configure audit entries to specify the types of access to audit.",

"Enable the Audit Object Access Policy."
],
answer:"Enable the Audit Object Access Policy."
},

{
question:"Which of the following are the valid criteria for a security log filters to identify specific file and folder access events? Select all that apply.",
options:[
"The date of the event",
"The user that generated the event",
"The type of object access that generated the event",
"Success or failure audit"
],
answer:"The date of the event, The user that generated the event, The type of object access that generated the event, Success or failure audit"
},

{
question:"How do you make a profile mandatory?",
options:[
"Configure the permissions on the folder Security property sheet to deny write permission.",
"Configure the permission on the folders sharing property sheet to allow only read permission.",
"Modify the attributes of the profile folder to specify the read only attribute.",
"Rename Ntuser.dat to Ntuser.man."
],
answer:"Rename Ntuser.dat to Ntuser.man."
},

{
question:"Which tool is used to check the effective policy settings for a user?",
options:[
"RSoP",
"Task Manager",
"Network Monitoring tool",
"Group Policy tool"
],
answer:"RSoP"
},

{
question:"A ________ is a hierarchical arrangement of Windows 2003 domains that share a common name.",
options:[
"Domain Tree",
"Forest",

"Groups"
],
answer:"Domain Tree"
},

{
question:"Remote Desktop uses which protocol to establish the connection.",
options:[
"IP-RDP",
"RDP-TCP",
"TCP-IP",
"IPX-TCP"
],
answer:"RDP-TCP"
},

{
question:"________ Used to define a collection of objects with common administrative and security needs within the forest.",
options:[
"Domain",
"Domain Tree",
"Organizational Unit",
"Active Directory"
],
answer:"Domain"
},

{
question:"You are the desktop administrator for a Company. The domain includes Windows Server 2008 domain controllers and Windows 7 client computers. A new administrator is hired to assist you in deploying Windows 7 to 100 new computers. He installs the operating system on a new computer named SYSTEM1. However, when he tries to log on to the domain, he is unsuccessful. The logon dialog box does not allow him to view and select the domain name. You need to ensure that he can log on to the domain from SYSTEM1. What should you do?",
options:[
"Enable the computer account for SYSTEM1.",
"Configure SYSTEM1 as a client of the domain.",
"Add his user account to the Admins group.",
"Add his user account to the Operators group."
],
answer:"Configure SYSTEM1 as a client of the domain."
},

{
question:"You are the desktop administrator for a Finance Company. All Systems run Windows 7 in a Windows 2008 Domain. A newly installed Windows 7 system was added to your domain. You need to configure the new system to ensure that it can be administered remotely. What should you do?",
options:[
"Install Terminal Server Licensing. Restart the system.",
"Modify the system properties for the system. Enable Remote Desktop for the system by selecting the Allow users to connect remotely to this system check box.",
"Start the Remote Access Connection Manager service and then configure the service to start automatically.",
"Modify your user account properties to enable you to connect to the terminal server."
],
answer:"Modify the system properties for the system. Enable Remote Desktop for the system by selecting the Allow users to connect remotely to this system check box."
},

{
question:"Which of the following types of files can be used for providing a buffered I/O access in fixed unit size to devices?",
options:[
"Symbolic link",
"Character special file",
"Block special file",
"Regular file"
],
answer:"Block special file"
},

{
question:"Which of the following statements is true?",
options:[
"Both related and unrelated processes can communicate using PIPE.",
"Related processes can not communicate using PIPE.",
"Both related and unrelated processes can communicate using FIFO.",
"Related processes can not communicate using FIFO."
],
answer:"Both related and unrelated processes can communicate using FIFO."
},

{
question:"Which of the following statements is not true?",
options:[
"A process terminates if we call function exit.",
"A process terminates if any of its thread returns from its start routine.",
"A process terminates after returning from main function.",
"A process terminates after calling abort function."
],
answer:"A process terminates if any of its thread returns from its start routine."
},

{
question:"A memory system in which low order byte of data is stored at lower address memory is said to be,",
options:[
"little endian byte ordered memory",
"less endian byte ordered memory",
"big endian byte ordered memory",
"higher endian byte ordered memory"
],
answer:"little endian byte ordered memory"
}

];

let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");

function loadQuestion(){

    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML = `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", () => {

            userAnswers[currentQuestion] = option;

            loadQuestion();
        });

        optionsEl.appendChild(div);
    });
}

nextBtn.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){
        currentQuestion++;
        loadQuestion();
    }

});

prevBtn.addEventListener("click", ()=>{

    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }

});

submitBtn.addEventListener("click", showResults);

function showResults(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    document.getElementById("quiz-container").style.display = "none";

    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "block";

    const percentage = ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats").innerHTML = `
        <p>Total Questions: ${quizData.length}</p>
        <p>Correct Answers: ${score}</p>
        <p>Wrong Answers: ${quizData.length - score}</p>
        <p>Percentage: ${percentage}%</p>
    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const isCorrect = userAnswers[index] === q.answer;

        div.innerHTML = `
            <h3>Q${index + 1}. ${q.question}</h3>

            <p class="${isCorrect ? 'correct' : 'wrong'}">
                Your Answer: ${userAnswers[index] || "Not Attempted"}
            </p>

            <p class="answer">
                Correct Answer: ${q.answer}
            </p>
        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
