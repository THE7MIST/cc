const quizForm = document.getElementById("quizForm");

questions.forEach((question,index)=>{

    const div = document.createElement("div");
    div.classList.add("question");

    let html = `<h3>${question.q}</h3>`;

    question.o.forEach((option,i)=>{

        html += `
        <label>
            <input type="radio" name="q${index}" value="${i}">
            ${option}
        </label>
        `;

    });

    div.innerHTML = html;

    quizForm.appendChild(div);

});

function submitQuiz(){

    event.preventDefault();

    let score = 0;

    questions.forEach((question,index)=>{

        const options = document.getElementsByName(`q${index}`);

        const selected = document.querySelector(`input[name="q${index}"]:checked`);

        options.forEach((option,i)=>{

            const parent = option.parentElement;

            parent.style.fontWeight = "normal";

            // Correct Answer
            if(i === question.a){

                parent.style.backgroundColor = "#d4edda";
                parent.style.color = "green";
                parent.style.fontWeight = "bold";

            }

            // Wrong Selected Answer
            if(option.checked && i !== question.a){

                parent.style.backgroundColor = "#f8d7da";
                parent.style.color = "red";

            }

            option.disabled = true;

        });

        if(selected){

            if(parseInt(selected.value) === question.a){

                score++;

            }

        }

    });

    const result = document.getElementById("result");

    const percentage = ((score/questions.length)*100).toFixed(2);

    let grade = "";

    if(score >= 27){
        grade = "Excellent";
    }
    else if(score >= 21){
        grade = "Good";
    }
    else if(score >= 15){
        grade = "Average";
    }
    else{
        grade = "Needs Improvement";
    }

    result.innerHTML = `
        Your Score: ${score} / ${questions.length}
        <br><br>
        Percentage: ${percentage}%
        <br><br>
        Result: ${grade}
    `;

    if(score >= 21){

        result.className = "correct";

    }else{

        result.className = "wrong";

    }

    document.querySelector("button").disabled = true;

    window.scrollTo(0,document.body.scrollHeight);

}
