<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>COSA Mock Test - Set 2</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#111827;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .subtitle{
        text-align:center;
        margin-bottom:25px;
        color:#cbd5e1;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        flex-wrap:wrap;
        gap:10px;
    }

    .progress{
        font-size:18px;
        font-weight:bold;
        color:#facc15;
    }

    .question-box{
        margin-bottom:25px;
    }

    .question{
        font-size:22px;
        margin-bottom:20px;
        line-height:1.5;
    }

    .options{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .option{
        background:#1e293b;
        border:2px solid transparent;
        padding:15px;
        border-radius:12px;
        cursor:pointer;
        transition:0.3s;
        font-size:18px;
    }

    .option:hover{
        background:#334155;
        transform:scale(1.01);
    }

    .option.selected{
        border:2px solid #38bdf8;
        background:#0f766e;
    }

    .buttons{
        display:flex;
        justify-content:space-between;
        margin-top:30px;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        padding:14px 22px;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }

    .prev-btn{
        background:#475569;
        color:white;
    }

    .next-btn{
        background:#2563eb;
        color:white;
    }

    .submit-btn{
        background:#16a34a;
        color:white;
    }

    button:hover{
        opacity:0.9;
        transform:translateY(-2px);
    }

    .result-box{
        display:none;
    }

    .result-box h2{
        text-align:center;
        margin-bottom:20px;
        color:#38bdf8;
    }

    .result-stats{
        text-align:center;
        margin-bottom:25px;
        line-height:2;
        font-size:20px;
    }

    .review{
        margin-top:20px;
    }

    .review-item{
        background:#1e293b;
        padding:18px;
        margin-bottom:15px;
        border-radius:12px;
    }

    .correct{
        color:#4ade80;
        margin-top:10px;
    }

    .wrong{
        color:#f87171;
        margin-top:10px;
    }

    .answer{
        color:#facc15;
        margin-top:8px;
    }

    @media(max-width:600px){

        .question{
            font-size:18px;
        }

        .option{
            font-size:16px;
        }

        button{
            width:100%;
        }

        .buttons{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div id="quiz-container">

        <h1>COSA Mock Test - Set 2</h1>
        <p class="subtitle">Windows + Linux Interactive MCQ Quiz</p>

        <div class="top-bar">
            <div class="progress" id="progress">Question 1 / 40</div>
        </div>

        <div class="question-box">
            <div class="question" id="question"></div>

            <div class="options" id="options"></div>
        </div>

        <div class="buttons">
            <button class="prev-btn" id="prevBtn">Previous</button>
            <button class="next-btn" id="nextBtn">Next</button>
            <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        </div>

    </div>

    <div class="result-box" id="resultBox">
        <h2>Quiz Result</h2>

        <div class="result-stats" id="resultStats"></div>

        <div class="review" id="review"></div>
    </div>

</div>

<script>

const quizData = [

{
question:"Which Active Directory component stores information about users, groups, and computers?",
options:["DNS","NTFS","Directory Database","IIS"],
answer:"Directory Database"
},

{
question:"Which Windows Server role resolves hostnames into IP addresses?",
options:["DHCP","DNS","ADDS","WDS"],
answer:"DNS"
},

{
question:"Which command is commonly used in PowerShell to list running services?",
options:["ps","service","Get-Service","netstat"],
answer:"Get-Service"
},

{
question:"Which Windows feature allows centralized software and security policy deployment?",
options:["Hyper-V","Group Policy","IIS","WSB"],
answer:"Group Policy"
},

{
question:"A company wants to deploy Windows installations over the network. Which technology should be used?",
options:["IIS","Hyper-V","WDS","DFS"],
answer:"WDS"
},

{
question:"Which DNS record maps a hostname to an IPv4 address?",
options:["MX","PTR","AAAA","A"],
answer:"A"
},

{
question:"Which service helps administrators centrally manage IP address usage?",
options:["DNS","IPAM","VPN","NLB"],
answer:"IPAM"
},

{
question:"Which type of Group Policy applies directly to a single computer only?",
options:["Domain Policy","Site Policy","Local Policy","Forest Policy"],
answer:"Local Policy"
},

{
question:"What is the primary purpose of Hyper-V checkpoints?",
options:["DNS replication","VM recovery state capture","User authentication","Log monitoring"],
answer:"VM recovery state capture"
},

{
question:"Which Windows component provides centralized authentication for VPN connections?",
options:["IIS","DFS","NPS","WDS"],
answer:"NPS"
},

{
question:"Which attack abuses excessive privileges in Active Directory?",
options:["Privilege Escalation","DNS Forwarding","DHCP Leasing","Deduplication"],
answer:"Privilege Escalation"
},

{
question:"Which Windows utility is mainly used for scripting and task automation?",
options:["cmd.exe","Bash","PowerShell","cron"],
answer:"PowerShell"
},

{
question:"Which protocol is used by DirectAccess and VPN solutions?",
options:["Remote connectivity protocols","SMTP","POP3","SNMP"],
answer:"Remote connectivity protocols"
},

{
question:"Which server role is associated with website hosting?",
options:["IIS","DHCP","ADDS","Exchange"],
answer:"IIS"
},

{
question:"What is the primary benefit of data deduplication?",
options:["Faster authentication","Reduced storage consumption","Increased IP availability","Better DNS caching"],
answer:"Reduced storage consumption"
},

{
question:"Which security issue may occur due to weak IIS configuration?",
options:["Directory browsing exposure","RAID failure","DHCP starvation","Kernel panic"],
answer:"Directory browsing exposure"
},

{
question:"Which feature provides file screening and storage quota management?",
options:["FSRM","DFS","WDS","NLB"],
answer:"FSRM"
},

{
question:"Which Windows server is specifically used for enterprise email infrastructure?",
options:["Exchange Server","IIS","Hyper-V","IPAM"],
answer:"Exchange Server"
},

{
question:"Which command displays manual pages for Linux commands?",
options:["help","whatis","man","locate"],
answer:"man"
},

{
question:"Which command removes an empty directory?",
options:["rm","rmdir","delete","erase"],
answer:"rmdir"
},

{
question:"Which permission allows execution of a file?",
options:["r","w","x","e"],
answer:"x"
},

{
question:"What does ACL stand for in Linux?",
options:["Access Control List","Administrative Command Layer","Advanced Configuration Logic","Access Command Login"],
answer:"Access Control List"
},

{
question:"Which command is used to display the first 10 lines of a file?",
options:["tail","cat","tac","head"],
answer:"head"
},

{
question:"Which Linux file system component stores user account information?",
options:["/etc/shadow","/etc/passwd","/boot/grub","/var/log"],
answer:"/etc/passwd"
},

{
question:"Which protocol encrypts remote terminal sessions?",
options:["FTP","Telnet","SSH","Finger"],
answer:"SSH"
},

{
question:"Which command compresses files using GNU zip?",
options:["zip","gzip","tar","compress"],
answer:"gzip"
},

{
question:"What is the purpose of the GRUB bootloader?",
options:["User authentication","Firewall management","Loading the Linux kernel","Package installation"],
answer:"Loading the Linux kernel"
},

{
question:"Which command displays the current logged-in users?",
options:["finger","who","jobs","uname"],
answer:"who"
},

{
question:"Which package format is associated with Red Hat-based systems?",
options:["DEB","RPM","PKG","APK"],
answer:"RPM"
},

{
question:"Which command compares differences between files?",
options:["cmp","grep","diff","locate"],
answer:"diff"
},

{
question:"Which Linux utility is commonly used for volume management?",
options:["NTP","LVM","RAID","VNC"],
answer:"LVM"
},

{
question:"Which command changes file permissions?",
options:["chmod","chgrp","chown","passwd"],
answer:"chmod"
},

{
question:"Which service enables Linux systems to share files with Windows systems?",
options:["NFS","Samba","Postfix","Squid"],
answer:"Samba"
},

{
question:"What is the default secure shell daemon configuration file?",
options:["/etc/ssh/sshd_config","/etc/passwd","/etc/fstab","/etc/group"],
answer:"/etc/ssh/sshd_config"
},

{
question:"Which Linux service provides email transfer functionality?",
options:["Dovecot","Postfix","Apache","Squid"],
answer:"Postfix"
},

{
question:"Which command searches recursively for files and directories?",
options:["grep","locate","find","wc"],
answer:"find"
},

{
question:"Which command displays active processes dynamically in real time?",
options:["ps","top","jobs","cal"],
answer:"top"
},

{
question:"Which Bash construct is used for decision making?",
options:["loop","regex","if statement","alias"],
answer:"if statement"
},

{
question:"Which directory commonly stores Linux log files?",
options:["/usr/log","/tmp/log","/var/log","/etc/log"],
answer:"/var/log"
},

{
question:"A Linux administrator disables password authentication and enables SSH keys. What security improvement does this provide?",
options:["Faster DNS resolution","Reduced brute-force vulnerability","Increased disk performance","Better package management"],
answer:"Reduced brute-force vulnerability"
}

];

let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");

function loadQuestion(){

    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML = `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", () => {

            userAnswers[currentQuestion] = option;

            loadQuestion();
        });

        optionsEl.appendChild(div);
    });
}

nextBtn.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){
        currentQuestion++;
        loadQuestion();
    }

});

prevBtn.addEventListener("click", ()=>{

    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }

});

submitBtn.addEventListener("click", showResults);

function showResults(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    document.getElementById("quiz-container").style.display = "none";

    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "block";

    const percentage = ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats").innerHTML = `
        <p>Total Questions: ${quizData.length}</p>
        <p>Correct Answers: ${score}</p>
        <p>Wrong Answers: ${quizData.length - score}</p>
        <p>Percentage: ${percentage}%</p>
    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const isCorrect = userAnswers[index] === q.answer;

        div.innerHTML = `
            <h3>Q${index + 1}. ${q.question}</h3>

            <p class="${isCorrect ? 'correct' : 'wrong'}">
                Your Answer: ${userAnswers[index] || "Not Attempted"}
            </p>

            <p class="answer">
                Correct Answer: ${q.answer}
            </p>
        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
