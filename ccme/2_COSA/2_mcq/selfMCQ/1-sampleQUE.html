<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>COSA MCQ Practice Quiz</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#111827;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .subtitle{
        text-align:center;
        margin-bottom:25px;
        color:#cbd5e1;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        flex-wrap:wrap;
        gap:10px;
    }

    .progress{
        font-size:18px;
        font-weight:bold;
        color:#facc15;
    }

    .question-box{
        margin-bottom:25px;
    }

    .question{
        font-size:22px;
        margin-bottom:20px;
        line-height:1.5;
    }

    .options{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .option{
        background:#1e293b;
        border:2px solid transparent;
        padding:15px;
        border-radius:12px;
        cursor:pointer;
        transition:0.3s;
        font-size:18px;
    }

    .option:hover{
        background:#334155;
        transform:scale(1.01);
    }

    .option.selected{
        border:2px solid #38bdf8;
        background:#0f766e;
    }

    .buttons{
        display:flex;
        justify-content:space-between;
        margin-top:30px;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        padding:14px 22px;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }

    .prev-btn{
        background:#475569;
        color:white;
    }

    .next-btn{
        background:#2563eb;
        color:white;
    }

    .submit-btn{
        background:#16a34a;
        color:white;
    }

    button:hover{
        opacity:0.9;
        transform:translateY(-2px);
    }

    .result-box{
        display:none;
    }

    .result-box h2{
        text-align:center;
        margin-bottom:20px;
        color:#38bdf8;
    }

    .result-stats{
        text-align:center;
        margin-bottom:25px;
        line-height:2;
        font-size:20px;
    }

    .review{
        margin-top:20px;
    }

    .review-item{
        background:#1e293b;
        padding:18px;
        margin-bottom:15px;
        border-radius:12px;
    }

    .correct{
        color:#4ade80;
        margin-top:10px;
    }

    .wrong{
        color:#f87171;
        margin-top:10px;
    }

    .answer{
        color:#facc15;
        margin-top:8px;
    }

    @media(max-width:600px){

        .question{
            font-size:18px;
        }

        .option{
            font-size:16px;
        }

        button{
            width:100%;
        }

        .buttons{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div id="quiz-container">

        <h1>COSA Mock Test</h1>
        <p class="subtitle">Windows + Linux Interactive MCQ Quiz</p>

        <div class="top-bar">
            <div class="progress" id="progress">Question 1 / 40</div>
        </div>

        <div class="question-box">
            <div class="question" id="question"></div>

            <div class="options" id="options"></div>
        </div>

        <div class="buttons">
            <button class="prev-btn" id="prevBtn">Previous</button>
            <button class="next-btn" id="nextBtn">Next</button>
            <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        </div>

    </div>

    <div class="result-box" id="resultBox">
        <h2>Quiz Result</h2>

        <div class="result-stats" id="resultStats"></div>

        <div class="review" id="review"></div>
    </div>

</div>

<script>

const quizData = [

{
    question:"Which service is primarily responsible for centralized authentication in a Windows domain?",
    options:["IIS","DHCP","Active Directory Domain Services","Hyper-V"],
    answer:"Active Directory Domain Services"
},

{
    question:"Which protocol does Active Directory primarily use for directory access?",
    options:["FTP","LDAP","SMTP","SNMP"],
    answer:"LDAP"
},

{
    question:"A system administrator wants to automatically assign IP addresses to clients. Which service should be configured?",
    options:["DNS","DHCP","ADDS","IIS"],
    answer:"DHCP"
},

{
    question:"Which restore type updates restored objects with newer changes from replication partners?",
    options:["Full Restore","Incremental Restore","Authoritative Restore","Non-authoritative Restore"],
    answer:"Non-authoritative Restore"
},

{
    question:"Which command-line shell is primarily used for Windows automation?",
    options:["Bash","CMD","PowerShell","KornShell"],
    answer:"PowerShell"
},

{
    question:"Which Windows feature is used to host websites?",
    options:["IIS","Hyper-V","NPS","WDS"],
    answer:"IIS"
},

{
    question:"What is the primary role of Group Policy?",
    options:["Backup Management","User Authentication","Centralized Configuration Management","Storage Deduplication"],
    answer:"Centralized Configuration Management"
},

{
    question:"A malicious user exploits excessive privileges in Active Directory. Which security principle was violated?",
    options:["Redundancy","Least Privilege","Availability","Replication"],
    answer:"Least Privilege"
},

{
    question:"Which technology allows multiple virtual machines to run on Windows Server?",
    options:["IIS","Hyper-V","DFS","IPAM"],
    answer:"Hyper-V"
},

{
    question:"Which protocol is commonly used for secure remote PowerShell administration?",
    options:["Telnet","FTP","WinRM","TFTP"],
    answer:"WinRM"
},

{
    question:"What is the default port number for DNS?",
    options:["21","25","53","443"],
    answer:"53"
},

{
    question:"Which component manages IP address tracking and allocation centrally?",
    options:["DFS","IPAM","GPO","NLB"],
    answer:"IPAM"
},

{
    question:"Which Windows service helps prevent duplicate data storage?",
    options:["WDS","FSRM","Deduplication","NPS"],
    answer:"Deduplication"
},

{
    question:"Which attack involves unauthorized DHCP servers distributing IP addresses?",
    options:["DNS Poisoning","Rogue DHCP","ARP Spoofing","SYN Flood"],
    answer:"Rogue DHCP"
},

{
    question:"Which server role is responsible for email services in Microsoft infrastructure?",
    options:["Exchange Server","IIS","DFS","WDS"],
    answer:"Exchange Server"
},

{
    question:"Which Windows feature can enforce password complexity across a domain?",
    options:["Hyper-V","Group Policy","IIS","NLB"],
    answer:"Group Policy"
},

{
    question:"Which service allows centralized policy-based network authentication?",
    options:["WSB","NPS","DFS","IIS"],
    answer:"NPS"
},

{
    question:"Which backup type contains only changes since the last backup?",
    options:["Full","Differential","Incremental","Mirror"],
    answer:"Incremental"
},

{
    question:"Which command displays the current working directory?",
    options:["ls","pwd","cd","whoami"],
    answer:"pwd"
},

{
    question:"Which command changes file ownership?",
    options:["chmod","chown","setfacl","passwd"],
    answer:"chown"
},

{
    question:"What does permission 755 mean?",
    options:["rwxr-xr-x","rwxrwxrwx","rw-r--r--","r-xr-xr-x"],
    answer:"rwxr-xr-x"
},

{
    question:"Which file stores encrypted user passwords in Linux?",
    options:["/etc/passwd","/etc/group","/etc/shadow","/etc/profile"],
    answer:"/etc/shadow"
},

{
    question:"Which command is used to securely connect to a remote Linux server?",
    options:["telnet","ftp","ssh","finger"],
    answer:"ssh"
},

{
    question:"Which bootloader is commonly used in Linux?",
    options:["NTLDR","BOOTMGR","GRUB","LILOX"],
    answer:"GRUB"
},

{
    question:"Which package manager is associated with Debian-based systems?",
    options:["RPM","YUM","DPKG","Pacman"],
    answer:"DPKG"
},

{
    question:"Which command searches for patterns inside files?",
    options:["grep","find","locate","diff"],
    answer:"grep"
},

{
    question:"What does the -l option in ls -l provide?",
    options:["Hidden files","Long listing format","Recursive listing","Sorted output"],
    answer:"Long listing format"
},

{
    question:"Which service provides secure file transfer over SSH?",
    options:["FTP","TFTP","SFTP","SCPD"],
    answer:"SFTP"
},

{
    question:"Which Linux utility manages logical volumes?",
    options:["fdisk","mkfs","LVM","mount"],
    answer:"LVM"
},

{
    question:"Which file contains SSH daemon configuration?",
    options:["/etc/ssh/ssh_config","/etc/ssh/sshd_config","/etc/passwd","/etc/network/interfaces"],
    answer:"/etc/ssh/sshd_config"
},

{
    question:"Which command archives files in Linux?",
    options:["zip","gzip","tar","unzip"],
    answer:"tar"
},

{
    question:"Which Apache feature allows hosting multiple websites on one server?",
    options:["Squid","Virtual Hosting","DNS Forwarding","Postfix"],
    answer:"Virtual Hosting"
},

{
    question:"What is the primary purpose of DNS?",
    options:["File Sharing","Time Synchronization","Name Resolution","User Authentication"],
    answer:"Name Resolution"
},

{
    question:"Which command displays running processes?",
    options:["jobs","top","ps","Both B and C"],
    answer:"Both B and C"
},

{
    question:"Which symbol redirects standard output to overwrite a file?",
    options:[">>","|",">","<"],
    answer:">"
},

{
    question:"Which Linux service synchronizes system time?",
    options:["SSH","NTP","LDAP","FTP"],
    answer:"NTP"
},

{
    question:"What is the purpose of chmod?",
    options:["Change ownership","Change permissions","Compress files","Mount disks"],
    answer:"Change permissions"
},

{
    question:"Which command is used to find files recursively?",
    options:["grep","locate","find","whereis"],
    answer:"find"
},

{
    question:"Which scripting construct repeats commands until a condition changes?",
    options:["Variable","Loop","Regex","Alias"],
    answer:"Loop"
},

{
    question:"A Linux administrator disables root SSH login. What is the primary security benefit?",
    options:["Faster login","Reduced brute-force attack surface","Better DNS resolution","Lower RAM usage"],
    answer:"Reduced brute-force attack surface"
}

];

let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");

function loadQuestion(){

    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML = `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", () => {

            userAnswers[currentQuestion] = option;

            loadQuestion();
        });

        optionsEl.appendChild(div);
    });
}

nextBtn.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){
        currentQuestion++;
        loadQuestion();
    }

});

prevBtn.addEventListener("click", ()=>{

    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }

});

submitBtn.addEventListener("click", showResults);

function showResults(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    document.getElementById("quiz-container").style.display = "none";

    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "block";

    const percentage = ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats").innerHTML = `
        <p>Total Questions: ${quizData.length}</p>
        <p>Correct Answers: ${score}</p>
        <p>Wrong Answers: ${quizData.length - score}</p>
        <p>Percentage: ${percentage}%</p>
    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const isCorrect = userAnswers[index] === q.answer;

        div.innerHTML = `
            <h3>Q${index + 1}. ${q.question}</h3>

            <p class="${isCorrect ? 'correct' : 'wrong'}">
                Your Answer: ${userAnswers[index] || "Not Attempted"}
            </p>

            <p class="answer">
                Correct Answer: ${q.answer}
            </p>
        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
