<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>COSA Mock Test - Set 2</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#111827;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .subtitle{
        text-align:center;
        margin-bottom:25px;
        color:#cbd5e1;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        flex-wrap:wrap;
        gap:10px;
    }

    .progress{
        font-size:18px;
        font-weight:bold;
        color:#facc15;
    }

    .question-box{
        margin-bottom:25px;
    }

    .question{
        font-size:22px;
        margin-bottom:20px;
        line-height:1.5;
    }

    .options{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .option{
        background:#1e293b;
        border:2px solid transparent;
        padding:15px;
        border-radius:12px;
        cursor:pointer;
        transition:0.3s;
        font-size:18px;
    }

    .option:hover{
        background:#334155;
        transform:scale(1.01);
    }

    .option.selected{
        border:2px solid #38bdf8;
        background:#0f766e;
    }

    .buttons{
        display:flex;
        justify-content:space-between;
        margin-top:30px;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        padding:14px 22px;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }

    .prev-btn{
        background:#475569;
        color:white;
    }

    .next-btn{
        background:#2563eb;
        color:white;
    }

    .submit-btn{
        background:#16a34a;
        color:white;
    }

    button:hover{
        opacity:0.9;
        transform:translateY(-2px);
    }

    .result-box{
        display:none;
    }

    .result-box h2{
        text-align:center;
        margin-bottom:20px;
        color:#38bdf8;
    }

    .result-stats{
        text-align:center;
        margin-bottom:25px;
        line-height:2;
        font-size:20px;
    }

    .review{
        margin-top:20px;
    }

    .review-item{
        background:#1e293b;
        padding:18px;
        margin-bottom:15px;
        border-radius:12px;
    }

    .correct{
        color:#4ade80;
        margin-top:10px;
    }

    .wrong{
        color:#f87171;
        margin-top:10px;
    }

    .answer{
        color:#facc15;
        margin-top:8px;
    }

    @media(max-width:600px){

        .question{
            font-size:18px;
        }

        .option{
            font-size:16px;
        }

        button{
            width:100%;
        }

        .buttons{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div id="quiz-container">

        <h1>COSA Mock Test - Set 2</h1>
        <p class="subtitle">Windows + Linux Interactive MCQ Quiz</p>

        <div class="top-bar">
            <div class="progress" id="progress">Question 1 / 40</div>
        </div>

        <div class="question-box">
            <div class="question" id="question"></div>

            <div class="options" id="options"></div>
        </div>

        <div class="buttons">
            <button class="prev-btn" id="prevBtn">Previous</button>
            <button class="next-btn" id="nextBtn">Next</button>
            <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        </div>

    </div>

    <div class="result-box" id="resultBox">
        <h2>Quiz Result</h2>

        <div class="result-stats" id="resultStats"></div>

        <div class="review" id="review"></div>
    </div>

</div>

<script>

const quizData = [

{
question:"What is Apache?",
options:["Database server","Mail server","Web server","DNS server"],
answer:"Web server"
},

{
question:"Which package commonly installs Apache in RHEL-based systems?",
options:["apache2","httpd","nginx","webd"],
answer:"httpd"
},

{
question:"Which command installs Apache on RHEL systems?",
options:[
"dnf install httpd -y",
"apt install apache",
"yum install nginx",
"rpm install apache2"
],
answer:"dnf install httpd -y"
},

{
question:"Which service name is associated with Apache in RHEL?",
options:["apache","apache2","httpd","webserver"],
answer:"httpd"
},

{
question:"Which command starts Apache service?",
options:[
"systemctl start httpd",
"service apache up",
"apache start",
"httpd up"
],
answer:"systemctl start httpd"
},

{
question:"Which command enables Apache at boot?",
options:[
"systemctl enable httpd",
"apache enable",
"chkconfig apache",
"httpd enable"
],
answer:"systemctl enable httpd"
},

{
question:"Which default port does Apache use?",
options:["21","22","80","443"],
answer:"80"
},

{
question:"Which secure protocol commonly works with Apache?",
options:["FTP","HTTPS","Telnet","SSHFS"],
answer:"HTTPS"
},

{
question:"Which port is default for HTTPS?",
options:["80","21","443","25"],
answer:"443"
},

{
question:"Which command checks Apache service status?",
options:[
"systemctl status httpd",
"apache status",
"httpd check",
"status apache"
],
answer:"systemctl status httpd"
},

{
question:"Which directory commonly stores Apache website files?",
options:["/srv","/var/www/html","/etc/httpd","/boot/httpd"],
answer:"/var/www/html"
},

{
question:"Which file is main Apache configuration file in RHEL?",
options:[
"/etc/httpd/httpd.conf",
"/etc/apache.conf",
"/etc/httpd.conf",
"/var/httpd.conf"
],
answer:"/etc/httpd/httpd.conf"
},

{
question:"Which command tests Apache configuration syntax?",
options:[
"apachectl configtest",
"testhttpd",
"httpd verify",
"apache syntax"
],
answer:"apachectl configtest"
},

{
question:"What does DocumentRoot specify?",
options:[
"Apache version",
"Website root directory",
"Log directory",
"SSL key location"
],
answer:"Website root directory"
},

{
question:"Which command reloads Apache without full restart?",
options:[
"systemctl reload httpd",
"reload apache",
"apachectl boot",
"service reload web"
],
answer:"systemctl reload httpd"
},

{
question:"Which Apache directive controls listening port?",
options:["Port","Listen","ServerPort","Bind"],
answer:"Listen"
},

{
question:"Which Apache module enables SSL support?",
options:["mod_ssl","mod_php","mod_proxy","mod_dir"],
answer:"mod_ssl"
},

{
question:"Which firewall service should be allowed for Apache?",
options:["ssh","samba","http","dns"],
answer:"http"
},

{
question:"Which command opens HTTP service in firewall?",
options:[
"firewall-cmd --add-service=http --permanent",
"iptables add apache",
"http enable firewall",
"openport apache"
],
answer:"firewall-cmd --add-service=http --permanent"
},

{
question:"Which command applies firewall changes?",
options:[
"firewall-cmd --reload",
"firewall-cmd --apply",
"iptables restart",
"systemctl restart firewall"
],
answer:"firewall-cmd --reload"
},

{
question:"Which log records website access requests?",
options:["error_log","access_log","secure_log","auth_log"],
answer:"access_log"
},

{
question:"Which log records Apache errors?",
options:["access_log","error_log","auth_log","login_log"],
answer:"error_log"
},

{
question:"Which directory commonly stores Apache logs?",
options:[
"/var/log/httpd",
"/etc/httpd/logs",
"/tmp/httpd",
"/usr/httpd/log"
],
answer:"/var/log/httpd"
},

{
question:"Which command continuously monitors Apache logs?",
options:[
"tail -f /var/log/httpd/access_log",
"watch apache",
"grep live log",
"logshow apache"
],
answer:"tail -f /var/log/httpd/access_log"
},

{
question:"What is Virtual Hosting?",
options:[
"Running VM",
"Hosting multiple websites on one server",
"Sharing NFS",
"Apache backup"
],
answer:"Hosting multiple websites on one server"
},

{
question:"Which directive identifies website hostname?",
options:["ServerName","HostName","WebName","VirtualHostName"],
answer:"ServerName"
},

{
question:"Which Apache misconfiguration may expose directory contents?",
options:[
"Directory browsing/listing enabled",
"SSL enabled",
"Firewall enabled",
"Virtual host enabled"
],
answer:"Directory browsing/listing enabled"
},

{
question:"Which directive disables directory listing?",
options:[
"Options -Indexes",
"Disable Browse",
"NoDirectory",
"Directory Off"
],
answer:"Options -Indexes"
},

{
question:"Which SELinux command temporarily disables enforcement?",
options:[
"selinux off",
"setenforce 0",
"disable selinux",
"selinux stop"
],
answer:"setenforce 0"
},

{
question:"Which command verifies Apache is listening on port 80?",
options:[
"ss -tulnp | grep 80",
"grep apache",
"httpd check port",
"portshow apache"
],
answer:"ss -tulnp | grep 80"
},

{
question:"Which command creates hard link?",
options:[
"ln file1 hardlink",
"ln -s file1 hardlink",
"linksoft file1",
"mklink hard"
],
answer:"ln file1 hardlink"
},

{
question:"Which command creates symbolic link?",
options:[
"ln -s file1 softlink",
"ln file1 softlink",
"link -soft",
"mksoft file1"
],
answer:"ln -s file1 softlink"
},

{
question:"What is another name for symbolic link?",
options:[
"Physical link",
"Soft link",
"Kernel link",
"Static link"
],
answer:"Soft link"
},

{
question:"Which link can span different filesystems?",
options:[
"Hard link",
"Soft link",
"Physical link",
"inode link"
],
answer:"Soft link"
},

{
question:"Which link uses same inode number as original file?",
options:[
"Soft link",
"Hard link",
"Mount link",
"Virtual link"
],
answer:"Hard link"
},

{
question:"Which command displays inode numbers?",
options:[
"ls -i",
"inode -show",
"stat inode",
"showinode"
],
answer:"ls -i"
},

{
question:"What happens to hard link if original file is deleted?",
options:[
"Hard link breaks",
"Data remains accessible",
"File disappears completely",
"System crash"
],
answer:"Data remains accessible"
},

{
question:"What happens to symbolic link if original file is deleted?",
options:[
"Link still works",
"Becomes broken/dangling",
"Converts to hard link",
"Recreates file automatically"
],
answer:"Becomes broken/dangling"
},

{
question:"Can hard links be created for directories normally?",
options:[
"Yes always",
"No, generally restricted",
"Only for root partition",
"Only with Apache"
],
answer:"No, generally restricted"
},

{
question:"Which file type indicator represents symbolic link in ls -l?",
options:["d","-","l","s"],
answer:"l"
},

{
question:"Which command shows current directory?",
options:["ls","pwd","cd","whoami"],
answer:"pwd"
},

{
question:"Which command changes directory?",
options:["mv","pwd","cd","locate"],
answer:"cd"
},

{
question:"Which command lists hidden files?",
options:["ls -l","ls -a","ls -h","ls -s"],
answer:"ls -a"
},

{
question:"Which command recursively copies directories?",
options:[
"cp -r dir1 dir2",
"copy dir1",
"mv -r dir1",
"scp dir1"
],
answer:"cp -r dir1 dir2"
},

{
question:"Which command removes empty directory?",
options:["rm","rmdir","deldir","erasedir"],
answer:"rmdir"
},

{
question:"Which command removes non-empty directory recursively?",
options:[
"rm -rf dir",
"rmdir -r dir",
"delete -all dir",
"remove dir"
],
answer:"rm -rf dir"
},

{
question:"Which command shows disk usage of directory?",
options:["df -h","du -sh","mount","lsblk"],
answer:"du -sh"
},

{
question:"Which command shows free disk space?",
options:["du","df -h","fdisk","mount"],
answer:"df -h"
},

{
question:"Which command finds Apache config files?",
options:[
'find /etc -name "*httpd*"',
"grep apache",
"whereis html",
"locate web"
],
answer:'find /etc -name "*httpd*"'
},

{
question:"A browser shows 403 Forbidden on Apache site. Most likely cause?",
options:[
"Wrong permissions/SELinux issue",
"GRUB corruption",
"Swap failure",
"SSH daemon stopped"
],
answer:"Wrong permissions/SELinux issue"
}

];

let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");

function loadQuestion(){

    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML = `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", () => {

            userAnswers[currentQuestion] = option;

            loadQuestion();
        });

        optionsEl.appendChild(div);
    });
}

nextBtn.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){
        currentQuestion++;
        loadQuestion();
    }

});

prevBtn.addEventListener("click", ()=>{

    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }

});

submitBtn.addEventListener("click", showResults);

function showResults(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    document.getElementById("quiz-container").style.display = "none";

    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "block";

    const percentage = ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats").innerHTML = `
        <p>Total Questions: ${quizData.length}</p>
        <p>Correct Answers: ${score}</p>
        <p>Wrong Answers: ${quizData.length - score}</p>
        <p>Percentage: ${percentage}%</p>
    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const isCorrect = userAnswers[index] === q.answer;

        div.innerHTML = `
            <h3>Q${index + 1}. ${q.question}</h3>

            <p class="${isCorrect ? 'correct' : 'wrong'}">
                Your Answer: ${userAnswers[index] || "Not Attempted"}
            </p>

            <p class="answer">
                Correct Answer: ${q.answer}
            </p>
        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
