<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>COSA Mock Test - Set 2</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#111827;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .subtitle{
        text-align:center;
        margin-bottom:25px;
        color:#cbd5e1;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        flex-wrap:wrap;
        gap:10px;
    }

    .progress{
        font-size:18px;
        font-weight:bold;
        color:#facc15;
    }

    .question-box{
        margin-bottom:25px;
    }

    .question{
        font-size:22px;
        margin-bottom:20px;
        line-height:1.5;
    }

    .options{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .option{
        background:#1e293b;
        border:2px solid transparent;
        padding:15px;
        border-radius:12px;
        cursor:pointer;
        transition:0.3s;
        font-size:18px;
    }

    .option:hover{
        background:#334155;
        transform:scale(1.01);
    }

    .option.selected{
        border:2px solid #38bdf8;
        background:#0f766e;
    }

    .buttons{
        display:flex;
        justify-content:space-between;
        margin-top:30px;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        padding:14px 22px;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }

    .prev-btn{
        background:#475569;
        color:white;
    }

    .next-btn{
        background:#2563eb;
        color:white;
    }

    .submit-btn{
        background:#16a34a;
        color:white;
    }

    button:hover{
        opacity:0.9;
        transform:translateY(-2px);
    }

    .result-box{
        display:none;
    }

    .result-box h2{
        text-align:center;
        margin-bottom:20px;
        color:#38bdf8;
    }

    .result-stats{
        text-align:center;
        margin-bottom:25px;
        line-height:2;
        font-size:20px;
    }

    .review{
        margin-top:20px;
    }

    .review-item{
        background:#1e293b;
        padding:18px;
        margin-bottom:15px;
        border-radius:12px;
    }

    .correct{
        color:#4ade80;
        margin-top:10px;
    }

    .wrong{
        color:#f87171;
        margin-top:10px;
    }

    .answer{
        color:#facc15;
        margin-top:8px;
    }

    @media(max-width:600px){

        .question{
            font-size:18px;
        }

        .option{
            font-size:16px;
        }

        button{
            width:100%;
        }

        .buttons{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div id="quiz-container">

        <h1>COSA Mock Test - Set 2</h1>
        <p class="subtitle">Windows + Linux Interactive MCQ Quiz</p>

        <div class="top-bar">
            <div class="progress" id="progress">Question 1 / 40</div>
        </div>

        <div class="question-box">
            <div class="question" id="question"></div>

            <div class="options" id="options"></div>
        </div>

        <div class="buttons">
            <button class="prev-btn" id="prevBtn">Previous</button>
            <button class="next-btn" id="nextBtn">Next</button>
            <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        </div>

    </div>

    <div class="result-box" id="resultBox">
        <h2>Quiz Result</h2>

        <div class="result-stats" id="resultStats"></div>

        <div class="review" id="review"></div>
    </div>

</div>

<script>

const quizData = [

{
question:"What is the first stage of Linux boot process?",
options:["Kernel","GRUB","BIOS/UEFI","systemd"],
answer:"BIOS/UEFI"
},

{
question:"What does POST stand for?",
options:[
"Power Operating System Test",
"Power-On Self Test",
"Process Operating Service Table",
"Program Output System Test"
],
answer:"Power-On Self Test"
},

{
question:"Which firmware is modern replacement for BIOS?",
options:["LILO","GPT","UEFI","GRUB"],
answer:"UEFI"
},

{
question:"Which partitioning scheme is mainly associated with UEFI?",
options:["MBR","ext4","GPT","FAT16"],
answer:"GPT"
},

{
question:"What is stored in first 512 bytes of MBR disk?",
options:[
"initramfs",
"Bootloader stage 1",
"Kernel modules",
"systemd targets"
],
answer:"Bootloader stage 1"
},

{
question:"Which bootloader is most commonly used in Linux?",
options:["NTLDR","BOOTMGR","GRUB2","SYSD"],
answer:"GRUB2"
},

{
question:"What is the role of bootloader?",
options:[
"Manage users",
"Load kernel into memory",
"Configure networking",
"Mount swap"
],
answer:"Load kernel into memory"
},

{
question:"Which file contains GRUB2 configuration?",
options:[
"/etc/passwd",
"/boot/grub/grub.cfg",
"/etc/fstab",
"/boot/initrd"
],
answer:"/boot/grub/grub.cfg"
},

{
question:"Which file contains editable GRUB defaults?",
options:[
"/etc/default/grub",
"/boot/grub.cfg",
"/etc/inittab",
"/etc/systemd"
],
answer:"/etc/default/grub"
},

{
question:"What is vmlinuz?",
options:[
"Swap partition",
"Kernel log",
"Compressed Linux kernel image",
"Bootloader"
],
answer:"Compressed Linux kernel image"
},

{
question:"What does initramfs provide?",
options:[
"Permanent filesystem",
"Temporary root filesystem",
"Network services",
"GUI environment"
],
answer:"Temporary root filesystem"
},

{
question:"Why is initramfs needed?",
options:[
"To manage users",
"To load drivers before mounting real root filesystem",
"To start GUI",
"To create partitions"
],
answer:"To load drivers before mounting real root filesystem"
},

{
question:"Which process always has PID 1?",
options:["bash","sshd","init/systemd","kernel"],
answer:"init/systemd"
},

{
question:"Which init system is dominant in modern Linux distributions?",
options:["SysVinit","Upstart","OpenRC","systemd"],
answer:"systemd"
},

{
question:"Which run level represents single-user mode?",
options:["0","1","3","5"],
answer:"1"
},

{
question:"Which run level represents reboot?",
options:["0","1","5","6"],
answer:"6"
},

{
question:"Which run level represents power off?",
options:["0","2","4","6"],
answer:"0"
},

{
question:"Which run level is commonly used for text-mode Linux servers?",
options:["1","3","5","6"],
answer:"3"
},

{
question:"Which run level commonly provides GUI mode?",
options:["1","2","3","5"],
answer:"5"
},

{
question:"Which run levels should NEVER be set as default?",
options:["1 and 3","2 and 4","0 and 6","3 and 5"],
answer:"0 and 6"
},

{
question:"Which command immediately switches systemd to rescue mode?",
options:[
"systemctl reboot",
"systemctl isolate rescue.target",
"init 6",
"reboot"
],
answer:"systemctl isolate rescue.target"
},

{
question:"Which target is equivalent to run level 5?",
options:[
"rescue.target",
"reboot.target",
"graphical.target",
"emergency.target"
],
answer:"graphical.target"
},

{
question:"Which target is equivalent to run level 3?",
options:[
"multi-user.target",
"graphical.target",
"rescue.target",
"reboot.target"
],
answer:"multi-user.target"
},

{
question:"Which command shows current default target?",
options:[
"systemctl get-default",
"systemctl show",
"targetctl",
"runlevel"
],
answer:"systemctl get-default"
},

{
question:"Which command permanently sets text-mode boot?",
options:[
"systemctl set-default multi-user.target",
"systemctl isolate graphical.target",
"init 5",
"reboot multi-user"
],
answer:"systemctl set-default multi-user.target"
},

{
question:"Which command displays kernel boot messages?",
options:["journalctl","dmesg","grep boot","top"],
answer:"dmesg"
},

{
question:"Which command shows logs from previous boot session?",
options:[
"journalctl -b",
"journalctl -b -1",
"dmesg -1",
"bootlog"
],
answer:"journalctl -b -1"
},

{
question:"Which command enters emergency mode in systemd?",
options:[
"systemctl emergency",
"init 0",
"systemctl reboot",
"halt"
],
answer:"systemctl emergency"
},

{
question:"What does getty provide?",
options:[
"Network interface",
"Text login prompt",
"Filesystem mounting",
"Kernel modules"
],
answer:"Text login prompt"
},

{
question:"A Linux system fails to boot because of incorrect /etc/fstab. Which mode is MOST useful for repair?",
options:[
"graphical.target",
"reboot.target",
"Single-user/rescue mode",
"Multi-user mode"
],
answer:"Single-user/rescue mode"
}

];

let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");

function loadQuestion(){

    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML = `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", () => {

            userAnswers[currentQuestion] = option;

            loadQuestion();
        });

        optionsEl.appendChild(div);
    });
}

nextBtn.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){
        currentQuestion++;
        loadQuestion();
    }

});

prevBtn.addEventListener("click", ()=>{

    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }

});

submitBtn.addEventListener("click", showResults);

function showResults(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    document.getElementById("quiz-container").style.display = "none";

    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "block";

    const percentage = ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats").innerHTML = `
        <p>Total Questions: ${quizData.length}</p>
        <p>Correct Answers: ${score}</p>
        <p>Wrong Answers: ${quizData.length - score}</p>
        <p>Percentage: ${percentage}%</p>
    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const isCorrect = userAnswers[index] === q.answer;

        div.innerHTML = `
            <h3>Q${index + 1}. ${q.question}</h3>

            <p class="${isCorrect ? 'correct' : 'wrong'}">
                Your Answer: ${userAnswers[index] || "Not Attempted"}
            </p>

            <p class="answer">
                Correct Answer: ${q.answer}
            </p>
        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
