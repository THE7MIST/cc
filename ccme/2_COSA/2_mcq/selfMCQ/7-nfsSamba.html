<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>COSA Mock Test - Set 2</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#111827;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .subtitle{
        text-align:center;
        margin-bottom:25px;
        color:#cbd5e1;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        flex-wrap:wrap;
        gap:10px;
    }

    .progress{
        font-size:18px;
        font-weight:bold;
        color:#facc15;
    }

    .question-box{
        margin-bottom:25px;
    }

    .question{
        font-size:22px;
        margin-bottom:20px;
        line-height:1.5;
    }

    .options{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .option{
        background:#1e293b;
        border:2px solid transparent;
        padding:15px;
        border-radius:12px;
        cursor:pointer;
        transition:0.3s;
        font-size:18px;
    }

    .option:hover{
        background:#334155;
        transform:scale(1.01);
    }

    .option.selected{
        border:2px solid #38bdf8;
        background:#0f766e;
    }

    .buttons{
        display:flex;
        justify-content:space-between;
        margin-top:30px;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        padding:14px 22px;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }

    .prev-btn{
        background:#475569;
        color:white;
    }

    .next-btn{
        background:#2563eb;
        color:white;
    }

    .submit-btn{
        background:#16a34a;
        color:white;
    }

    button:hover{
        opacity:0.9;
        transform:translateY(-2px);
    }

    .result-box{
        display:none;
    }

    .result-box h2{
        text-align:center;
        margin-bottom:20px;
        color:#38bdf8;
    }

    .result-stats{
        text-align:center;
        margin-bottom:25px;
        line-height:2;
        font-size:20px;
    }

    .review{
        margin-top:20px;
    }

    .review-item{
        background:#1e293b;
        padding:18px;
        margin-bottom:15px;
        border-radius:12px;
    }

    .correct{
        color:#4ade80;
        margin-top:10px;
    }

    .wrong{
        color:#f87171;
        margin-top:10px;
    }

    .answer{
        color:#facc15;
        margin-top:8px;
    }

    @media(max-width:600px){

        .question{
            font-size:18px;
        }

        .option{
            font-size:16px;
        }

        button{
            width:100%;
        }

        .buttons{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div id="quiz-container">

        <h1>COSA Mock Test - Set 2</h1>
        <p class="subtitle">Windows + Linux Interactive MCQ Quiz</p>

        <div class="top-bar">
            <div class="progress" id="progress">Question 1 / 40</div>
        </div>

        <div class="question-box">
            <div class="question" id="question"></div>

            <div class="options" id="options"></div>
        </div>

        <div class="buttons">
            <button class="prev-btn" id="prevBtn">Previous</button>
            <button class="next-btn" id="nextBtn">Next</button>
            <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        </div>

    </div>

    <div class="result-box" id="resultBox">
        <h2>Quiz Result</h2>

        <div class="result-stats" id="resultStats"></div>

        <div class="review" id="review"></div>
    </div>

</div>

<script>



const quizData = [

{
question:"What does NFS stand for?",
options:[
"Network File Security",
"New File Sharing",
"Network File System",
"Network Folder Service"
],
answer:"Network File System"
},

{
question:"What is the primary purpose of NFS?",
options:[
"User authentication",
"Sharing directories over a network",
"DNS resolution",
"Web hosting"
],
answer:"Sharing directories over a network"
},

{
question:"Which package commonly provides NFS services in RHEL-based systems?",
options:["samba","nfs-utils","cifs-utils","rpc-utils"],
answer:"nfs-utils"
},

{
question:"Which file contains NFS export configurations?",
options:[
"/etc/fstab",
"/etc/nfs.conf",
"/etc/exports",
"/etc/share"
],
answer:"/etc/exports"
},

{
question:"Which command applies changes made to /etc/exports?",
options:[
"exportfs -rav",
"mount -a",
"systemctl reload nfs",
"showmount"
],
answer:"exportfs -rav"
},

{
question:"Which daemon/service is essential for NFS communication?",
options:["sshd","rpcbind","crond","smbd"],
answer:"rpcbind"
},

{
question:"Which service provides NFS server functionality?",
options:[
"nfs-server",
"nfs-client",
"rpc.nfsd",
"mountd"
],
answer:"nfs-server"
},

{
question:"Which command displays exported NFS shares?",
options:[
"showmount -e",
"exportfs -u",
"mount -nfs",
"nfsstat -m"
],
answer:"showmount -e"
},

{
question:"Which command mounts an NFS share manually?",
options:[
"mount -t nfs SERVER:/data /mnt",
"mount -nfs SERVER:/data",
"nfsmount SERVER:/data",
"mount -t smb SERVER:/data"
],
answer:"mount -t nfs SERVER:/data /mnt"
},

{
question:"Which option in /etc/exports allows read-write access?",
options:["ro","rw","write","full"],
answer:"rw"
},

{
question:"What does sync option do in NFS exports?",
options:[
"Enables GUI sync",
"Writes changes immediately to disk",
"Enables network sync only",
"Enables backup"
],
answer:"Writes changes immediately to disk"
},

{
question:"What is the security risk of no_root_squash?",
options:[
"Slower performance",
"Remote root user keeps root privileges",
"Read-only mount",
"Disables exports"
],
answer:"Remote root user keeps root privileges"
},

{
question:"What does root_squash do?",
options:[
"Deletes root account",
"Maps remote root user to anonymous user",
"Disables root filesystem",
"Compresses root directory"
],
answer:"Maps remote root user to anonymous user"
},

{
question:"Which command verifies mounted NFS shares?",
options:[
"df -h",
"mount | grep nfs",
"Both A and B",
"showmount -a"
],
answer:"Both A and B"
},

{
question:"Which file is used for permanent NFS mounts?",
options:[
"/etc/passwd",
"/etc/fstab",
"/etc/shadow",
"/etc/exports"
],
answer:"/etc/fstab"
},

{
question:"Which command applies /etc/fstab changes immediately?",
options:[
"mount -a",
"exportfs -rav",
"remountfs",
"nfs-reload"
],
answer:"mount -a"
},

{
question:"Which firewall service should be allowed for NFS?",
options:["ssh","samba","nfs","ftp"],
answer:"nfs"
},

{
question:"Which command checks active firewall rules?",
options:[
"firewall-cmd --list-all",
"iptables -a",
"nfsstat",
"rpcinfo"
],
answer:"firewall-cmd --list-all"
},

{
question:"Which command restarts NFS server?",
options:[
"systemctl restart nfs-server",
"service nfs reload",
"nfs restart",
"rpcbind reload"
],
answer:"systemctl restart nfs-server"
},

{
question:"What does this export mean? /data 192.168.220.0/24(rw,sync)",
options:[
"Share only for localhost",
"Share read-only to all",
"Share read-write to subnet",
"Samba share"
],
answer:"Share read-write to subnet"
},

{
question:"What is Samba mainly used for?",
options:[
"Linux-Linux file sharing only",
"Windows-Linux interoperability",
"DNS management",
"NFS replacement only"
],
answer:"Windows-Linux interoperability"
},

{
question:"Which protocol does Samba implement?",
options:["HTTP","FTP","SMB/CIFS","NFS"],
answer:"SMB/CIFS"
},

{
question:"Which package installs Samba server?",
options:["nfs-utils","samba","cifs-utils","rpcbind"],
answer:"samba"
},

{
question:"Which file contains Samba configuration?",
options:[
"/etc/samba/smb.conf",
"/etc/samba.conf",
"/etc/smbusers",
"/etc/cifs.conf"
],
answer:"/etc/samba/smb.conf"
},

{
question:"Which command validates Samba configuration syntax?",
options:[
"smbcheck",
"testparm",
"smbverify",
"validate-samba"
],
answer:"testparm"
},

{
question:"Which service provides Samba file sharing?",
options:["smb","nmb","smbd","Both A and C"],
answer:"Both A and C"
},

{
question:"Which service helps NetBIOS name resolution?",
options:["rpcbind","nmb","mountd","crond"],
answer:"nmb"
},

{
question:"Which command accesses Samba share from Linux client?",
options:[
"smbclient //SERVER/share",
"mount -t nfs",
"showmount -e",
"rpcinfo"
],
answer:"smbclient //SERVER/share"
},

{
question:"Which parameter allows anonymous access in Samba?",
options:[
"public = yes",
"guest ok = yes",
"allow anonymous = yes",
"writable = all"
],
answer:"guest ok = yes"
},

{
question:"Which Samba parameter restricts users to specific accounts/groups?",
options:[
"allowed users",
"valid users",
"secure users",
"samba users"
],
answer:"valid users"
},

{
question:"Which command creates Samba password for user?",
options:[
"passwd smbuser",
"smbpasswd -a smbuser",
"sambaadd smbuser",
"smbuseradd"
],
answer:"smbpasswd -a smbuser"
},

{
question:"Which utility is required for mounting Samba/CIFS shares?",
options:[
"samba-utils",
"cifs-utils",
"nfs-utils",
"rpc-utils"
],
answer:"cifs-utils"
},

{
question:"Which filesystem type is used for Samba mounts?",
options:["nfs","ext4","cifs","smbfs2"],
answer:"cifs"
},

{
question:"Which command mounts Samba share manually?",
options:[
"mount -t cifs //SERVER/share /mnt",
"mount -t nfs //SERVER/share",
"smbmount share",
"mount -samba"
],
answer:"mount -t cifs //SERVER/share /mnt"
},

{
question:"Which ports are commonly used by Samba?",
options:[
"21 and 22",
"80 and 443",
"139 and 445",
"53 and 67"
],
answer:"139 and 445"
},

{
question:"What is the purpose of browseable = yes?",
options:[
"Enables browsing of share in network discovery",
"Enables firewall",
"Enables write permission",
"Enables NFS"
],
answer:"Enables browsing of share in network discovery"
},

{
question:"Which command shows Samba service logs?",
options:[
"tail -f /var/log/samba/log.smbd",
"showmount -e",
"mount -a",
"nfsstat"
],
answer:"tail -f /var/log/samba/log.smbd"
},

{
question:"What is the purpose of setenforce 0 during troubleshooting?",
options:[
"Enables firewall",
"Temporarily disables SELinux enforcement",
"Enables root login",
"Restarts Samba"
],
answer:"Temporarily disables SELinux enforcement"
},

{
question:"An NFS client can ping server but mount fails. Most likely issue?",
options:[
"DNS problem",
"NFS/firewall/service issue",
"Wrong shell",
"Missing cron"
],
answer:"NFS/firewall/service issue"
},

{
question:"A Samba share is accessible but file upload fails. Most likely cause?",
options:[
"Wrong DNS",
"Directory permission issue",
"Kernel panic",
"GRUB corruption"
],
answer:"Directory permission issue"
}

];


let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");

function loadQuestion(){

    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML = `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", () => {

            userAnswers[currentQuestion] = option;

            loadQuestion();
        });

        optionsEl.appendChild(div);
    });
}

nextBtn.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){
        currentQuestion++;
        loadQuestion();
    }

});

prevBtn.addEventListener("click", ()=>{

    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }

});

submitBtn.addEventListener("click", showResults);

function showResults(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    document.getElementById("quiz-container").style.display = "none";

    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "block";

    const percentage = ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats").innerHTML = `
        <p>Total Questions: ${quizData.length}</p>
        <p>Correct Answers: ${score}</p>
        <p>Wrong Answers: ${quizData.length - score}</p>
        <p>Percentage: ${percentage}%</p>
    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const isCorrect = userAnswers[index] === q.answer;

        div.innerHTML = `
            <h3>Q${index + 1}. ${q.question}</h3>

            <p class="${isCorrect ? 'correct' : 'wrong'}">
                Your Answer: ${userAnswers[index] || "Not Attempted"}
            </p>

            <p class="answer">
                Correct Answer: ${q.answer}
            </p>
        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
