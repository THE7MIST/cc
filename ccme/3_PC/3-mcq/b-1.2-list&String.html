<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python MCQ Quiz (51-100)</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:950px;
    background:#111827;
    padding:30px;
    border-radius:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

.progress{
    margin-bottom:20px;
    color:#facc15;
    font-size:18px;
}

.question{
    font-size:24px;
    line-height:1.5;
    margin-bottom:25px;
}

.options{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.option{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    border:2px solid transparent;
    transition:0.3s;
}

.option:hover{
    background:#334155;
}

.option.selected{
    border-color:#38bdf8;
    background:#0f766e;
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
    gap:15px;
}

button{
    padding:14px 24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.prev-btn{
    background:#475569;
    color:white;
}

.next-btn{
    background:#2563eb;
    color:white;
}

.submit-btn{
    background:#16a34a;
    color:white;
}

.result-box{
    display:none;
}

.review-item{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.correct{
    color:#4ade80;
}

.wrong{
    color:#f87171;
}

.answer{
    color:#facc15;
}

</style>
</head>

<body>

<div class="container">

<div id="quiz-container">

<h1>Python MCQ Quiz (51–100)</h1>

<div class="progress" id="progress"></div>

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<div class="buttons">
<button class="prev-btn" id="prevBtn">Previous</button>
<button class="next-btn" id="nextBtn">Next</button>
<button class="submit-btn" id="submitBtn">Submit</button>
</div>

</div>

<div class="result-box" id="resultBox">

<h1>Quiz Result</h1>

<div id="resultStats"></div>

<div id="review"></div>

</div>

</div>

<script>

const quizData = [

{
question:"Output of a=[1,2,3] print(min(a))?",
options:["1","2","3","Error"],
answer:"1"
},

{
question:"Output of a=[1,2,3] print(max(a))?",
options:["1","2","3","Error"],
answer:"3"
},

{
question:"Output of a=[1,2,3] print(a.index(2))?",
options:["1","2","3","Error"],
answer:"1"
},

{
question:"Output of a=[1,2,2,3] print(a.count(2))?",
options:["1","2","3","4"],
answer:"2"
},

{
question:"Output of a=[1,2,3] a.clear() print(a)?",
options:["None","[]","Error","[1,2,3]"],
answer:"[]"
},

{
question:"Output of a=[1,2,3] print(a[:])?",
options:["[]","[1,2,3]","Error","[1]"],
answer:"[1,2,3]"
},

{
question:"Output of a=[1,2,3] print(a[1:])?",
options:["[1]","[2,3]","[1,2]","Error"],
answer:"[2,3]"
},

{
question:"Output of a=[1,2,3] print(a[:2])?",
options:["[1,2]","[2,3]","[1]","Error"],
answer:"[1,2]"
},

{
question:"Output of a=[[1,2],[3,4]] print(a[1][0])?",
options:["1","2","3","4"],
answer:"3"
},

{
question:"Output of a=[1,2,3] a[1]=10 print(a)?",
options:["[1,2,3]","[1,10,3]","[10,2,3]","Error"],
answer:"[1,10,3]"
},

{
question:"Output of a=[1,2] b=[3,4] print(a+b)?",
options:["[1,2,3,4]","[4,6]","Error","[[1,2],[3,4]]"],
answer:"[1,2,3,4]"
},

{
question:"Output of a=[1] a*=3 print(a)?",
options:["[1,1,1]","[3]","Error","[1,3]"],
answer:"[1,1,1]"
},

{
question:'Output of d={"a":1,"b":2} print(d.values())?',
options:["[1,2]","dict_values([1,2])","(1,2)","Error"],
answer:"dict_values([1,2])"
},

{
question:'Output of d={"a":1} d["a"]=5 print(d)?',
options:['{"a":1}','{"a":5}','Error','None'],
answer:'{"a":5}'
},

{
question:'Output of d={"a":1} print(d.pop("a"))?',
options:["a","1","{}","Error"],
answer:"1"
},

{
question:'Output of d={"a":1} print(list(d))?',
options:["[1]","['a']","Error","[('a',1)]"],
answer:"['a']"
},

{
question:'Output of d={"a":1} print("b" in d)?',
options:["True","False","None","Error"],
answer:"False"
},

{
question:'Output of d={"a":1} print(d.setdefault("a",5))?',
options:["1","5","None","Error"],
answer:"1"
},

{
question:'Output of d={"a":1} print(d.setdefault("b",5))?',
options:["1","5","None","Error"],
answer:"5"
},

{
question:'Output of d={"a":1} del d["a"] print(d)?',
options:['{"a":1}','{}','None','Error'],
answer:'{}'
},

{
question:'Output of s="python" print(s[1:4])?',
options:["pyt","yth","tho","Error"],
answer:"yth"
},

{
question:'Output of s="python" print(s[:4])?',
options:["pyth","ytho","thon","Error"],
answer:"pyth"
},

{
question:'Output of s="python" print(s[4:])?',
options:["on","thon","nohtyp","Error"],
answer:"on"
},

{
question:'Output of s="python" print(s[-3:])?',
options:["pyt","hon","thon","Error"],
answer:"hon"
},

{
question:'Output of s="python" print(s[::])?',
options:["python","nohtyp","Error","[]"],
answer:"python"
},

{
question:'Output of s="abcd" print(s[1::2])?',
options:["ac","bd","bc","Error"],
answer:"bd"
},

{
question:'Output of s="abcd" print(s[::-2])?',
options:["db","dc","ca","Error"],
answer:"db"
},

{
question:'Output of s="hello" print(s.capitalize())?',
options:["HELLO","Hello","hello","Error"],
answer:"Hello"
},

{
question:'Output of s="HELLO" print(s.casefold())?',
options:["hello","HELLO","Hello","Error"],
answer:"hello"
},

{
question:'Output of s="hello" print(s.startswith("he"))?',
options:["True","False","hello","Error"],
answer:"True"
},

{
question:'Output of s="hello" print(s.endswith("lo"))?',
options:["True","False","hello","Error"],
answer:"True"
},

{
question:'Output of s="hello123" print(s.isalpha())?',
options:["True","False","Error","None"],
answer:"False"
},

{
question:'Output of s="123abc" print(s.isalnum())?',
options:["True","False","Error","None"],
answer:"True"
},

{
question:'Output of s="123" print(s.isnumeric())?',
options:["True","False","Error","None"],
answer:"True"
},

{
question:'Output of s="a,b,c" print(s.split(","))?',
options:["['a','b','c']","a,b,c","('a','b','c')","Error"],
answer:"['a','b','c']"
},

{
question:'Output of a=["1","2","3"] print(",".join(a))?',
options:["123","1,2,3","['1,2,3']","Error"],
answer:"1,2,3"
},

{
question:'Output of s="python" print(s.find("z"))?',
options:["0","-1","None","Error"],
answer:"-1"
},

{
question:'Output of s="banana" print(s.count("a"))?',
options:["2","3","4","Error"],
answer:"3"
},

{
question:'Output of s="python" print(s.replace("o","0"))?',
options:["pyth0n","python","Error","python0"],
answer:"pyth0n"
},

{
question:'Output of s="hello" print(s.center(10,"-"))?',
options:["hello-----","--hello---","---hello--","Error"],
answer:"---hello--"
},

{
question:'Output of a=[1,2,3] print(any(a))?',
options:["True","False","Error","None"],
answer:"True"
},

{
question:'Output of a=[1,2,3] print(all(a))?',
options:["True","False","Error","None"],
answer:"True"
},

{
question:'Output of a=[0,1,2] print(all(a))?',
options:["True","False","0","Error"],
answer:"False"
},

{
question:'Output of a=[] print(bool(a))?',
options:["True","False","None","Error"],
answer:"False"
},

{
question:'Output of s="" print(bool(s))?',
options:["True","False","Error","None"],
answer:"False"
},

{
question:'Output of a=[1,2,3] print(type(a))?',
options:["tuple","dict","list","set"],
answer:"list"
},

{
question:'Output of d={} print(type(d))?',
options:["list","dict","tuple","set"],
answer:"dict"
},

{
question:'Output of s="abc" print(type(s))?',
options:["str","list","tuple","dict"],
answer:"str"
},

{
question:'Output of a=[1,2,3] print(a==[1,2,3])?',
options:["True","False","Error","None"],
answer:"True"
},

{
question:'Output of s="python" print(s.index("t"))?',
options:["1","2","3","Error"],
answer:"2"
}
];

let currentQuestion = 0;

let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

function loadQuestion(){

    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML =
    `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option=>{

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", ()=>{

            userAnswers[currentQuestion] = option;

            loadQuestion();

        });

        optionsEl.appendChild(div);

    });

}

document.getElementById("nextBtn")
.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){

        currentQuestion++;

        loadQuestion();

    }

});

document.getElementById("prevBtn")
.addEventListener("click", ()=>{

    if(currentQuestion > 0){

        currentQuestion--;

        loadQuestion();

    }

});

document.getElementById("submitBtn")
.addEventListener("click", showResults);

function showResults(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    document.getElementById("quiz-container")
    .style.display = "none";

    document.getElementById("resultBox")
    .style.display = "block";

    const percentage =
    ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats")
    .innerHTML = `

    <h2>Total Questions: ${quizData.length}</h2>
    <h2>Correct Answers: ${score}</h2>
    <h2>Wrong Answers: ${quizData.length - score}</h2>
    <h2>Percentage: ${percentage}%</h2>
    <br><br>

    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const correct =
        userAnswers[index] === q.answer;

        div.innerHTML = `

        <h3>Q${index+1}. ${q.question}</h3>

        <p class="${correct ? 'correct' : 'wrong'}">
        Your Answer:
        ${userAnswers[index] || "Not Attempted"}
        </p>

        <p class="answer">
        Correct Answer:
        ${q.answer}
        </p>

        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
