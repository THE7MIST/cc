<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MySQL MCQ Practice Quiz</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#111827;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .subtitle{
        text-align:center;
        margin-bottom:25px;
        color:#cbd5e1;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        flex-wrap:wrap;
        gap:10px;
    }

    .progress{
        font-size:18px;
        font-weight:bold;
        color:#facc15;
    }
/* 
    .score{
        font-size:18px;
        font-weight:bold;
        color:#4ade80;
    } */

    .question-box{
        margin-bottom:25px;
    }

    .question{
        font-size:22px;
        margin-bottom:20px;
        line-height:1.5;
    }

    .options{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .option{
        background:#1e293b;
        border:2px solid transparent;
        padding:15px;
        border-radius:12px;
        cursor:pointer;
        transition:0.3s;
        font-size:18px;
    }

    .option:hover{
        background:#334155;
        transform:scale(1.01);
    }

    .option.selected{
        border:2px solid #38bdf8;
        background:#0f766e;
    }

    .buttons{
        display:flex;
        justify-content:space-between;
        margin-top:30px;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        padding:14px 22px;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }

    .prev-btn{
        background:#475569;
        color:white;
    }

    .next-btn{
        background:#2563eb;
        color:white;
    }

    .submit-btn{
        background:#16a34a;
        color:white;
    }

    button:hover{
        opacity:0.9;
        transform:translateY(-2px);
    }

    .result-box{
        display:none;
    }

    .result-box h2{
        text-align:center;
        margin-bottom:20px;
        color:#38bdf8;
    }

    .result-stats{
        text-align:center;
        margin-bottom:25px;
        line-height:2;
        font-size:20px;
    }

    .review{
        margin-top:20px;
    }

    .review-item{
        background:#1e293b;
        padding:18px;
        margin-bottom:15px;
        border-radius:12px;
    }

    .correct{
        color:#4ade80;
        margin-top:10px;
    }

    .wrong{
        color:#f87171;
        margin-top:10px;
    }

    .answer{
        color:#facc15;
        margin-top:8px;
    }

    @media(max-width:600px){

        .question{
            font-size:18px;
        }

        .option{
            font-size:16px;
        }

        button{
            width:100%;
        }

        .buttons{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div id="quiz-container">

        <h1>MySQL MCQ Practice</h1>
        <p class="subtitle">Interactive SQL Quiz Engine</p>

        <div class="top-bar">
            <div class="progress" id="progress">Question 1 / 10</div>
        </div>

        <div class="question-box">
            <div class="question" id="question"></div>

            <div class="options" id="options"></div>
        </div>

        <div class="buttons">
            <button class="prev-btn" id="prevBtn">Previous</button>
            <button class="next-btn" id="nextBtn">Next</button>
            <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        </div>

    </div>

    <div class="result-box" id="resultBox">
        <h2>Quiz Result</h2>

        <div class="result-stats" id="resultStats"></div>

        <div class="review" id="review"></div>
    </div>

</div>

<script>
const quizData = [

{
    question:"Which command is used to create a new database?",
    options:["MAKE DATABASE","CREATE DATABASE","NEW DATABASE","INIT DATABASE"],
    answer:"CREATE DATABASE"
},

{
    question:"Which SQL statement removes an existing database?",
    options:["DELETE DATABASE","REMOVE DATABASE","DROP DATABASE","ERASE DATABASE"],
    answer:"DROP DATABASE"
},

{
    question:"Which key uniquely identifies each row in a table?",
    options:["Foreign Key","Candidate Key","Primary Key","Super Key"],
    answer:"Primary Key"
},

{
    question:"A Foreign Key is mainly used to:",
    options:["Speed up queries","Connect tables","Encrypt data","Delete records"],
    answer:"Connect tables"
},

{
    question:"Which clause filters rows before grouping?",
    options:["HAVING","WHERE","ORDER BY","GROUP BY"],
    answer:"WHERE"
},

{
    question:"Which clause is used to sort query results?",
    options:["FILTER BY","ORDER BY","SORT","ARRANGE BY"],
    answer:"ORDER BY"
},

{
    question:"Which SQL function returns total number of rows?",
    options:["TOTAL()","COUNT()","NUMBER()","SUM()"],
    answer:"COUNT()"
},

{
    question:"Which JOIN returns matching records from both tables?",
    options:["INNER JOIN","CROSS JOIN","FULL JOIN","SELF JOIN"],
    answer:"INNER JOIN"
},

{
    question:"Which statement is correct?",
    options:[
        "HAVING works before GROUP BY",
        "WHERE works after GROUP BY",
        "HAVING filters grouped data",
        "ORDER BY filters rows"
    ],
    answer:"HAVING filters grouped data"
},

{
    question:"Which command gives privileges to a user?",
    options:["PERMIT","ALLOW","GRANT","ENABLE"],
    answer:"GRANT"
},

{
    question:"Which command removes privileges from a user?",
    options:["DELETE","REVOKE","DENY","REMOVE"],
    answer:"REVOKE"
},

{
    question:"Which of the following is an aggregate function?",
    options:["LENGTH()","CONCAT()","AVG()","LOWER()"],
    answer:"AVG()"
},

{
    question:"Which keyword combines rows from multiple tables?",
    options:["LINK","CONNECT","JOIN","MERGE"],
    answer:"JOIN"
},

{
    question:"Which SQL clause groups rows having same values?",
    options:["ORDER BY","GROUP BY","HAVING","UNION"],
    answer:"GROUP BY"
},

{
    question:"Which SQL statement retrieves data?",
    options:["FETCH","GET","SELECT","SHOW"],
    answer:"SELECT"
},

{
    question:"Which operator is commonly used in SQL Injection attacks?",
    options:["&&","||","OR","XOR"],
    answer:"OR"
},

{
    question:"Which of these improves search performance?",
    options:["Trigger","Procedure","Index","Constraint"],
    answer:"Index"
},

{
    question:"Which backup stores SQL statements?",
    options:["Physical Backup","Binary Backup","Logical Backup","Dynamic Backup"],
    answer:"Logical Backup"
},

{
    question:"What does SQL stand for?",
    options:[
        "Structured Query Language",
        "Standard Query Logic",
        "Sequential Query Language",
        "Structured Question Language"
    ],
    answer:"Structured Query Language"
},

{
    question:"Which clause is used with aggregate functions?",
    options:["ORDER BY","HAVING","CREATE","LIMIT"],
    answer:"HAVING"
},

{
    question:"Which query shows all columns from employee table?",
    options:[
        "SELECT employee;",
        "SELECT ALL employee;",
        "SELECT * FROM employee;",
        "DISPLAY employee;"
    ],
    answer:"SELECT * FROM employee;"
},

{
    question:"Which symbol is used for all columns?",
    options:["%","*","#","@"],
    answer:"*"
},

{
    question:"Which command changes existing table structure?",
    options:["UPDATE TABLE","MODIFY TABLE","ALTER TABLE","CHANGE TABLE"],
    answer:"ALTER TABLE"
},

{
    question:"Which query deletes all rows but keeps table structure?",
    options:["REMOVE","TRUNCATE","DROP","ERASE"],
    answer:"TRUNCATE"
},

{
    question:"Which JOIN returns all possible combinations?",
    options:["INNER JOIN","LEFT JOIN","CROSS JOIN","SELF JOIN"],
    answer:"CROSS JOIN"
},

{
    question:"Which command permanently removes a table?",
    options:["DELETE TABLE","DROP TABLE","REMOVE TABLE","CLEAR TABLE"],
    answer:"DROP TABLE"
},

{
    question:"Which clause is used to filter grouped records?",
    options:["WHERE","GROUP BY","HAVING","ORDER BY"],
    answer:"HAVING"
},

{
    question:"Which SQL keyword avoids duplicate results?",
    options:["UNIQUE","DISTINCT","FILTER","DIFFERENT"],
    answer:"DISTINCT"
},

{
    question:"Which command adds new rows into a table?",
    options:["APPEND","INSERT","ADD","UPDATE"],
    answer:"INSERT"
},

{
    question:"Which command changes existing data?",
    options:["MODIFY","CHANGE","UPDATE","ALTER"],
    answer:"UPDATE"
},

{
    question:"Which SQL statement removes specific rows?",
    options:["DROP","DELETE","REMOVE","CLEAR"],
    answer:"DELETE"
},

{
    question:"Which normal form reduces duplicate data?",
    options:["Normal Form","Database Form","Normalization","Structuring"],
    answer:"Normalization"
},

{
    question:"Which of these is NOT a valid SQL aggregate function?",
    options:["MAX()","MIN()","AVG()","SORT()"],
    answer:"SORT()"
},

{
    question:"Which command creates an index?",
    options:["BUILD INDEX","MAKE INDEX","CREATE INDEX","ADD INDEX"],
    answer:"CREATE INDEX"
},

{
    question:"What is the main purpose of indexing?",
    options:[
        "Encrypt database",
        "Reduce storage",
        "Improve query speed",
        "Prevent joins"
    ],
    answer:"Improve query speed"
},

{
    question:"Which query returns employees with salary greater than 5000?",
    options:[
        "SELECT * FROM employee IF salary > 5000;",
        "SELECT * FROM employee WHERE salary > 5000;",
        "GET employee salary > 5000;",
        "SHOW employee > 5000;"
    ],
    answer:"SELECT * FROM employee WHERE salary > 5000;"
},

{
    question:"Which SQL clause sorts in descending order?",
    options:["ASC","UP","DESC","REVERSE"],
    answer:"DESC"
},

{
    question:"Which key references a primary key from another table?",
    options:["Candidate Key","Alternate Key","Foreign Key","Composite Key"],
    answer:"Foreign Key"
},

{
    question:"What is schema in database?",
    options:[
        "Query language",
        "Database structure",
        "Backup method",
        "Security feature"
    ],
    answer:"Database structure"
},

{
    question:"Which JOIN returns all rows from left table and matching rows from right table?",
    options:["INNER JOIN","RIGHT JOIN","LEFT JOIN","FULL JOIN"],
    answer:"LEFT JOIN"
},

{
    question:"Which function returns highest value?",
    options:["TOP()","MAX()","HIGH()","UPPER()"],
    answer:"MAX()"
},

{
    question:"Which function returns lowest value?",
    options:["LOW()","MIN()","SMALL()","LOWER()"],
    answer:"MIN()"
},

{
    question:"Which command is used to create a table?",
    options:["MAKE TABLE","NEW TABLE","CREATE TABLE","BUILD TABLE"],
    answer:"CREATE TABLE"
},

{
    question:"Which command adds a new column?",
    options:["ALTER TABLE","UPDATE TABLE","MODIFY TABLE","INSERT COLUMN"],
    answer:"ALTER TABLE"
},

{
    question:"Which SQL clause limits returned rows?",
    options:["RESTRICT","LIMIT","TOP","RANGE"],
    answer:"LIMIT"
},

{
    question:"Which operator checks for NULL values?",
    options:["= NULL","== NULL","IS NULL","HAS NULL"],
    answer:"IS NULL"
},

{
    question:"Which query returns unique department names?",
    options:[
        "SELECT UNIQUE dept FROM employee;",
        "SELECT DISTINCT dept FROM employee;",
        "SELECT ONLY dept FROM employee;",
        "SELECT SINGLE dept FROM employee;"
    ],
    answer:"SELECT DISTINCT dept FROM employee;"
},

{
    question:"Which SQL statement combines results of two SELECT queries?",
    options:["MERGE","JOIN","UNION","COMBINE"],
    answer:"UNION"
},

{
    question:"Which clause is mandatory in every SELECT query?",
    options:["WHERE","GROUP BY","FROM","ORDER BY"],
    answer:"FROM"
},

{
    question:"Which SQL keyword renames a column/table temporarily?",
    options:["AS","RENAME","NAME","CHANGE"],
    answer:"AS"
},

{
    question:"Which backup type stores actual database files?",
    options:["Logical Backup","Physical Backup","Virtual Backup","SQL Backup"],
    answer:"Physical Backup"
},

{
    question:"Which of these is related to database security?",
    options:["SQL Injection","Defragmentation","Compression","Rendering"],
    answer:"SQL Injection"
},

{
    question:"Which principle gives minimum required permissions?",
    options:[
        "Full Access Principle",
        "Admin Policy",
        "Principle of Least Privilege",
        "Open Access Principle"
    ],
    answer:"Principle of Least Privilege"
},

{
    question:"Which SQL command creates a new user?",
    options:["ADD USER","NEW USER","CREATE USER","INSERT USER"],
    answer:"CREATE USER"
},

{
    question:"Which scaling method adds more servers?",
    options:[
        "Vertical Scaling",
        "Horizontal Scaling",
        "Logical Scaling",
        "Static Scaling"
    ],
    answer:"Horizontal Scaling"
},

{
    question:"Which scaling method upgrades RAM/CPU?",
    options:[
        "Vertical Scaling",
        "Horizontal Scaling",
        "Parallel Scaling",
        "Distributed Scaling"
    ],
    answer:"Vertical Scaling"
},

{
    question:"Which query is an example of subquery?",
    options:[
        "SELECT * FROM emp;",
        "SELECT name FROM emp WHERE salary > (SELECT AVG(salary) FROM emp);",
        "DELETE FROM emp;",
        "CREATE TABLE emp;"
    ],
    answer:"SELECT name FROM emp WHERE salary > (SELECT AVG(salary) FROM emp);"
},

{
    question:"Which JOIN can produce very large result sets accidentally?",
    options:["INNER JOIN","LEFT JOIN","CROSS JOIN","RIGHT JOIN"],
    answer:"CROSS JOIN"
},

{
    question:"Which command removes both data and table structure?",
    options:["DELETE","TRUNCATE","DROP","REMOVE"],
    answer:"DROP"
},

{
    question:"Which of the following is TRUE?",
    options:[
        "WHERE can use aggregate functions directly",
        "HAVING is used after GROUP BY",
        "GROUP BY sorts data",
        "ORDER BY filters rows"
    ],
    answer:"HAVING is used after GROUP BY"
},

{
    question:"Which function calculates average values?",
    options:["SUM()","COUNT()","AVG()","TOTAL()"],
    answer:"AVG()"
},

{
    question:"Which clause is used to combine conditions?",
    options:["AND","GROUP","JOIN","LINK"],
    answer:"AND"
},

{
    question:"Which statement is used to remove duplicate rows?",
    options:["UNIQUE","DISTINCT","CLEAR","REMOVE"],
    answer:"DISTINCT"
}

];
let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");

function loadQuestion(){
 
    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML = `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", () => {

            userAnswers[currentQuestion] = option;

            loadQuestion();
        });

        optionsEl.appendChild(div);
    });

    updateScore();
}

function updateScore(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    scoreEl.innerHTML = `Score: ${score}`;
}

nextBtn.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){
        currentQuestion++;
        loadQuestion();
    }

});

prevBtn.addEventListener("click", ()=>{

    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }

});

submitBtn.addEventListener("click", showResults);

function showResults(){

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){
            score++;
        }

    });

    document.getElementById("quiz-container").style.display = "none";

    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "block";

    const percentage = ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats").innerHTML = `
        <p>Total Questions: ${quizData.length}</p>
        <p>Correct Answers: ${score}</p>
        <p>Wrong Answers: ${quizData.length - score}</p>
        <p>Percentage: ${percentage}%</p>
    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const isCorrect = userAnswers[index] === q.answer;

        div.innerHTML = `
            <h3>Q${index + 1}. ${q.question}</h3>

            <p class="${isCorrect ? 'correct' : 'wrong'}">
                Your Answer: ${userAnswers[index] || "Not Attempted"}
            </p>

            <p class="answer">
                Correct Answer: ${q.answer}
            </p>
        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
