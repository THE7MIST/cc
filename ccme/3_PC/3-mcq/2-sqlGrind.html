.next-btn{

.submit-btn{

let currentQuestion = 0;

let userAnswers = new Array(quizData.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");

function loadQuestion(){

    const current = quizData[currentQuestion];

    questionEl.innerHTML = current.question;

    progressEl.innerHTML =
        `Question ${currentQuestion + 1} / ${quizData.length}`;

    optionsEl.innerHTML = "";

    current.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        div.innerHTML = option;

        div.addEventListener("click", ()=>{

            userAnswers[currentQuestion] = option;

            loadQuestion();

        });

        optionsEl.appendChild(div);

    });

}

nextBtn.addEventListener("click", ()=>{

    if(currentQuestion < quizData.length - 1){

        currentQuestion++;

        loadQuestion();

    }

});

prevBtn.addEventListener("click", ()=>{

    if(currentQuestion > 0){

        currentQuestion--;

        loadQuestion();

    }

});

submitBtn.addEventListener("click", showResults);

    let score = 0;

    quizData.forEach((q,index)=>{

        if(userAnswers[index] === q.answer){

            score++;

        }

    });

    document.getElementById("quiz-container").style.display = "none";

    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "block";

    const percentage =
        ((score / quizData.length) * 100).toFixed(2);

    document.getElementById("resultStats").innerHTML = `
        <p>Total Questions: ${quizData.length}</p>
        <p>Correct Answers: ${score}</p>
        <p>Wrong Answers: ${quizData.length - score}</p>
        <p>Percentage: ${percentage}%</p>
    `;

    const review = document.getElementById("review");

    review.innerHTML = "";

    quizData.forEach((q,index)=>{

        const div = document.createElement("div");

        div.classList.add("review-item");

        const isCorrect =
            userAnswers[index] === q.answer;

        div.innerHTML = `
            <h3>Q${index + 1}. ${q.question}</h3>

            <p class="${isCorrect ? 'correct' : 'wrong'}">
                Your Answer:
                ${userAnswers[index] || "Not Attempted"}
            </p>

            <p class="answer">
                Correct Answer:
                ${q.answer}
            </p>
        `;

        review.appendChild(div);

    });

}

loadQuestion();

</script>

</body>
</html>
